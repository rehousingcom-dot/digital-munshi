# Render.com blueprint — ek click deploy (Render dashboard > New > Blueprint)
# Yeh web service + managed PostgreSQL dono bana deta hai.
services:
  - type: web
    name: digital-munshi
    runtime: python
    plan: starter            # ~$7/mo (free plan bhi try kar sakte ho, par sleep hota hai)
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn config.wsgi:application --workers 3 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render apne aap random secret banata hai
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "digital-munshi.onrender.com"   # apne service ka URL daalein
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DATABASE_URL
        fromDatabase:
          name: digital-munshi-db
          property: connectionString

databases:
  - name: digital-munshi-db
    plan: basic-256mb        # sasta managed PostgreSQL
    databaseName: erp_munshi
