<style>
  :root{
    --brand:#ea6a1e; --brand-2:#f59e0b; --brand-dark:#c2410c;
    --ink:#0f172a; --muted:#64748b; --line:#eceef3; --bg:#f7f5f2;
    --ok:#059669; --warn:#d97706; --danger:#dc2626;

  *{ font-family:'Inter',system-ui,sans-serif; box-sizing:border-box; }
  html,body{ margin:0; }
  body{ background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; }
  h1,h2,h3,h4{ font-family:'Plus Jakarta Sans','Inter',sans-serif; letter-spacing:-0.02em; }

  /* Cards */
  .card{ background:#fff; border-radius:18px; border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(16,24,40,.04), 0 12px 28px -16px rgba(16,24,40,.18);
    transition:transform .18s cubic-bezier(.4,0,.2,1), box-shadow .18s ease; }
  .card.hover-lift:hover{ transform:translateY(-3px); box-shadow:0 1px 2px rgba(16,24,40,.05), 0 22px 44px -22px rgba(234,106,30,.32); }
  body[data-theme="dark"] .card.hover-lift:hover{ box-shadow:0 22px 44px -22px rgba(0,0,0,.7); }
  .kpi-card{ position:relative; overflow:hidden; }
  .kpi-card::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent,#ea6a1e); }

  /* Buttons */
  button{ transition:all .16s cubic-bezier(.4,0,.2,1); border-radius:11px; font-weight:600; cursor:pointer; }
  .bg-blue-900, .bg-blue-700{ background:linear-gradient(135deg,#f97316,#ea580c) !important;
    box-shadow:0 8px 20px -8px rgba(234,88,12,.55); border:none; }
  .bg-blue-900:hover{ transform:translateY(-1px); filter:brightness(1.06); }
  .bg-emerald-500,.bg-emerald-600{ background:linear-gradient(135deg,#10b981,#059669)!important; box-shadow:0 8px 20px -8px rgba(16,185,129,.5); }
  .bg-green-600,.bg-green-700{ background:linear-gradient(135deg,#10b981,#059669)!important; }
  .bg-amber-600{ background:linear-gradient(135deg,#f59e0b,#d97706)!important; }
  .bg-slate-700{ background:linear-gradient(135deg,#475569,#334155)!important; }
  .text-blue-900{ color:var(--brand-dark)!important; }
  .text-blue-700,.text-blue-600{ color:var(--brand)!important; }

  /* Inputs */
  input,select,textarea{ border-radius:11px !important; border:1px solid #e2e8f0; transition:all .15s; background:#fff; }
  input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--brand); box-shadow:0 0 0 4px rgba(234,106,30,.15); }
  input::placeholder{ color:#94a3b8; }

  /* Sidebar */
  aside.bg-blue-900{ background:linear-gradient(180deg,#431a08 0%,#7c2d12 50%,#b3400f 100%)!important;
    box-shadow:4px 0 24px -12px rgba(124,45,18,.6); }
  aside button{ border-radius:12px; font-weight:600; color:#ffffff; padding:11px 12px !important; }
  aside button span{ color:#ffffff; }
  aside button:hover{ background:rgba(255,255,255,.14)!important; color:#fff; }
  aside button.bg-blue-700{ background:rgba(255,255,255,.22)!important; color:#fff!important; box-shadow:inset 0 0 0 1px rgba(255,255,255,.18); }
  aside .text-indigo-300{ color:rgba(255,255,255,.72) !important; }
  aside .text-base{ color:#ffffff; }

  /* Tables */
  table thead tr{ background:#f8fafc; }
  table th{ font-weight:600; color:#64748b; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  table tbody tr{ transition:background .12s; }
  table tbody tr:hover{ background:#f8fafc; }

  /* Misc */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#cbd5e1; border-radius:8px; border:2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover{ background:#94a3b8; }
  .fade-in{ animation:fadeIn .3s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .kpi{ position:relative; overflow:hidden; }
  .kpi::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:4px; }

  /* ---------- Dark mode ---------- */
  body[data-theme="dark"]{ --bg:#0b1220; background:#0b1220; color:#e2e8f0; }
  body[data-theme="dark"] .card{ background:#151e30; border-color:#27314a; box-shadow:0 12px 30px -18px rgba(0,0,0,.7); }
  body[data-theme="dark"] .text-slate-800,
  body[data-theme="dark"] .text-slate-700,
  body[data-theme="dark"] .text-slate-600{ color:#e5e9f2 !important; }
  body[data-theme="dark"] .text-slate-500{ color:#94a3b8 !important; }
  body[data-theme="dark"] .text-slate-400{ color:#64748b !important; }
  body[data-theme="dark"] .bg-white{ background:#151e30 !important; }
  body[data-theme="dark"] .bg-slate-50,
  body[data-theme="dark"] .bg-slate-100,

  body[data-theme="dark"] input,
  body[data-theme="dark"] select,
  body[data-theme="dark"] textarea{ background:#0b1220; border-color:#27314a; color:#e2e8f0; }
  body[data-theme="dark"] input::placeholder{ color:#64748b; }
  body[data-theme="dark"] table thead tr{ background:#0b1220; }
  body[data-theme="dark"] table tbody tr{ border-color:#27314a; }
  body[data-theme="dark"] table tbody tr:hover{ background:#1e293b; }
  body[data-theme="dark"] .border,
  body[data-theme="dark"] .border-slate-100,
  body[data-theme="dark"] .border-slate-200{ border-color:#27314a !important; }
  .topbar{ margin:14px 18px 4px; border-radius:18px; background:#ffffff;
    border:1px solid #e9ecf3;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset, 0 14px 34px -16px rgba(31,41,90,.30), 0 3px 8px -3px rgba(16,24,40,.10);
    backdrop-filter:saturate(180%) blur(8px); }
  body[data-theme="dark"] .topbar{ background:#121a2c; border-color:#27314a;
    box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 16px 36px -16px rgba(0,0,0,.7); }
  .iconbtn{ width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    background:#f1f5f9; transition:all .15s; }
  .iconbtn:hover{ background:#e2e8f0; }
  body[data-theme="dark"] .iconbtn{ background:#1e293b; }
  .plan-badge{ display:inline-flex; align-items:center; gap:6px; font-weight:800; font-size:12px;
    letter-spacing:.02em; padding:7px 14px; border-radius:999px; color:#fff; cursor:pointer;
    box-shadow:0 8px 18px -8px rgba(0,0,0,.4); transition:transform .15s; }
  .plan-badge:hover{ transform:translateY(-1px); }
  .report-btn{ transition:all .15s ease; border:1px solid var(--line); background:#fff; }
  .report-btn:hover{ background:#fff7ed; border-color:#fed7aa; transform:translateY(-2px); box-shadow:0 10px 22px -12px rgba(234,106,30,.4); }
  body[data-theme="dark"] .report-btn:hover{ background:#27314a; border-color:#3a4a6b; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
{% verbatim %}
const { useState, useEffect, useRef } = React;
const API = "/api";

// ---------- auth + fetch helper ----------
function getToken(){ return localStorage.getItem("dm_token"); }
function setToken(t){ if(t) localStorage.setItem("dm_token", t); else localStorage.removeItem("dm_token"); }
function getRefresh(){ return localStorage.getItem("dm_refresh"); }
function setRefresh(t){ if(t) localStorage.setItem("dm_refresh", t); else localStorage.removeItem("dm_refresh"); }
function saveTokens(d){ if(!d) return; if(d.access) setToken(d.access); if(d.refresh) setRefresh(d.refresh); }
function clearAuth(){ setToken(null); setRefresh(null); }

// 401 aane par pehle refresh token se naya access lene ki koshish — tabhi logout.
async function tryRefresh(){
  const r = getRefresh();
  if(!r) return false;
  try{
    const res = await fetch(API+"/auth/token/refresh/", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({refresh:r})});
    if(!res.ok) return false;
    const d = await res.json();
    if(d.access){ setToken(d.access); if(d.refresh) setRefresh(d.refresh); return true; }
  }catch(e){}
  return false;
}

async function api(path, opts={}, _retried){
  const headers = {"Content-Type":"application/json", ...(opts.headers||{})};
  const t = getToken();
  if(t) headers["Authorization"] = "Bearer "+t;
  const res = await fetch(API+path, {...opts, headers});
  if(res.status===401){
    if(!_retried && await tryRefresh()) return api(path, opts, true);
    clearAuth(); location.reload(); return;
  }
  const ct = res.headers.get("content-type")||"";
  const data = ct.includes("json") ? await res.json() : await res.text();
  if(!res.ok) throw data;
  return data;
}
const money = n => "₹"+Number(n||0).toLocaleString("en-IN",{maximumFractionDigits:2});
// Paginated ya plain array — dono se array nikaalta hai
const asList = d => Array.isArray(d) ? d : (d && d.results ? d.results : []);
const apiList = async (path) => asList(await api(path));

async function shareWhatsApp(id){
  try{ const r=await api(`/vouchers/${id}/share_link/`); window.open(r.whatsapp_url,"_blank"); }
  catch(e){ alert("Share link banane mein dikkat aayi"); }
}

// ---------- inline SVG icons (lucide-style) ----------
const PATHS = {

  sale:'M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0',
  items:'M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.3 7 12 12l8.7-5M12 22V12',
  parties:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8',
  vouchers:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8',
  reports:'M3 3v18h18M18 17V9M13 17V5M8 17v-3',
  hr:'M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM19 8v6M22 11h-6',
  staff:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8',
  settings:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z',
  plan:'M12 2 2 7l10 5 10-5zM2 17l10 5 10-5M2 12l10 5 10-5',
  admin:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
  logout:'M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9',
  sales:'M23 6l-9.5 9.5-5-5L1 18M17 6h6v6',
  profit:'M20 12V8H6a2 2 0 0 1 0-4h12v4M4 6v12a2 2 0 0 0 2 2h14v-4M18 12a2 2 0 0 0 0 4h4v-4z',
  tax:'M19 5 5 19M6.5 6.5a2 2 0 1 0 0 .01M17.5 17.5a2 2 0 1 0 0 .01',
  invoices:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8',
  coins:'M12 8a8 3 0 1 0 0-6 8 3 0 0 0 0 6zM4 6v6a8 3 0 0 0 16 0V6M4 12v6a8 3 0 0 0 16 0v-6',
  alert:'M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0zM12 9v4M12 17h.01',

  utils:'M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 0 0 5.4-5.4l-2.1 2.1-2.4-.6-.6-2.4z',
  pos:'M2 7h20l-2 13H4zM2 7l2-4h16l2 4M9 11v5M15 11v5',
  accounting:'M3 3v18h18M7 16V9M12 16V5M17 16v-7M3 3h18',
};
function Icon({n, size=18, color="currentColor", stroke=2}){
  return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
    strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"><path d={PATHS[n]||""}/></svg>);
}

// ---------- Login / Signup ----------
function Login({onLogin}){
  const [mode,setMode]=useState("login");
  const [f,setF]=useState({username:"",password:"",email:"",org_name:"",business_type:"RETAIL"});
  const [err,setErr]=useState(""),[busy,setBusy]=useState(false);
  const [showPass,setShowPass]=useState(false);
  const BTYPES=[["RETAIL","Retail Shop / Kirana"],["WHOLESALE","Wholesale / Distributor"],["RESTAURANT","Restaurant / Cafe"],["PHARMACY","Pharmacy / Medical"],["SERVICES","Services / Professional"],["MANUFACTURER","Manufacturer"],["GENERAL","General / Other"]];
  const set=k=>e=>setF({...f,[k]:e.target.value});
  const submit=async e=>{ e.preventDefault(); setErr(""); setBusy(true);
    try{
      if(mode==="login"){
        const d=await fetch(API+"/auth/token/",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:f.username,password:f.password})}).then(r=>r.json());
        if(d.access){ saveTokens(d); onLogin(); } else setErr("Galat username/password");
      }else{
        const r=await fetch(API+"/signup/",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(f)});
        const d=await r.json();
        if(r.ok && d.tokens){ saveTokens(d.tokens); onLogin(); } else setErr(d.detail||"Signup failed");
      }
    }catch(e){ setErr("Kuch galat hua"); } setBusy(false); };
  const FEATURES=["GST-ready invoice — print, PDF & WhatsApp","Live stock + low-stock alerts","Payments, udhaar & auto reminders","Staff payroll, attendance & payslip","Accounting, reports & GSTR","POS, barcode & thermal print"];
  return (
    <div className="min-h-screen w-full" style={{background:"radial-gradient(1100px 560px at 82% -8%, rgba(251,146,60,0.28), transparent 60%), linear-gradient(135deg,#2b1407 0%,#7c2d12 46%,#ea580c 100%)"}}>
      <div className="min-h-screen flex flex-col lg:flex-row">
        {/* LEFT — marketing */}
        <div className="lg:w-[56%] px-6 py-8 lg:px-16 lg:py-12 flex flex-col justify-between text-white">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-11 h-11 rounded-2xl bg-white/15 flex items-center justify-center text-2xl shadow-lg" style={{backdropFilter:"blur(6px)"}}>📒</div>
              <div className="text-xl font-extrabold tracking-tight">Digital Munshi</div>
            </div>
            <div className="hidden lg:flex items-center gap-2 text-xs font-semibold bg-white/10 px-3 py-1.5 rounded-full">🇮🇳 Made in India</div>
          </div>

          <div className="my-8 lg:my-0">
            <div className="inline-flex items-center gap-2 bg-white/10 text-orange-50 text-xs font-semibold px-3 py-1.5 rounded-full mb-5">⭐ 4.8/5 — 10,000+ Indian businesses ka bharosa</div>
            <h1 style={{fontSize:"clamp(32px,4.2vw,54px)",lineHeight:1.07,fontWeight:800,letterSpacing:"-0.02em"}}>Billing software nahi,<br/><span style={{color:"#ffedd5"}}>aapka digital Munshi.</span></h1>
            <p className="text-orange-100 mt-5 text-lg" style={{maxWidth:490,opacity:0.95}}>GST invoice, stock, payments aur staff payroll — sab ek hi jagah. Kisi bhi business ke liye, sirf 5 minute me shuru.</p>

            <div className="mt-7 grid sm:grid-cols-2 gap-x-8 gap-y-3" style={{maxWidth:580}}>
              {FEATURES.map((t,i)=>(
                <div key={i} className="flex items-center gap-2.5">
                  <span className="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center text-xs shrink-0">✓</span>
                  <span className="text-orange-50" style={{fontSize:15}}>{t}</span>
                </div>
              ))}
            </div>

            <div className="mt-8 bg-white/10 rounded-2xl p-4 flex items-start gap-3" style={{maxWidth:490,backdropFilter:"blur(6px)"}}>
              <div className="w-9 h-9 rounded-full bg-orange-200 text-orange-900 flex items-center justify-center font-bold shrink-0">R</div>
              <div>
                <p className="text-sm text-orange-50">"Tally chhod ke Digital Munshi pe aaya. Billing ab 3x fast, GST report ek click me."</p>
                <p className="text-xs text-orange-200 mt-1">— Rajesh, Kirana & Wholesale, Jaipur</p>
              </div>
            </div>
          </div>

          <div className="hidden lg:flex items-center gap-4 text-orange-200 text-xs" style={{opacity:0.8}}>
            <span>© Digital Munshi ERP</span><span>•</span><span>Bank-grade security</span><span>•</span><span>Daily cloud backup</span>
          </div>
        </div>

        {/* RIGHT — auth card */}
        <div className="lg:w-[44%] flex items-center justify-center px-5 pb-10 lg:p-10">
          <div className="w-full bg-white rounded-3xl shadow-2xl p-7 sm:p-9 fade-in" style={{maxWidth:430}}>
            <div className="lg:hidden flex items-center gap-2 justify-center text-orange-600 font-extrabold mb-4"><span className="text-2xl">📒</span> Digital Munshi</div>
            <h2 className="text-2xl font-extrabold text-slate-900">{mode==="login"?"Welcome back 👋":"Free trial shuru karein 🚀"}</h2>
            <p className="text-sm text-slate-500 mt-1">{mode==="login"?"Apne account mein login karein":"Naya business banao — 7 din bilkul free"}</p>
            {mode==="signup"
              ? <div className="flex flex-wrap gap-2 mb-5 mt-3">{["No credit card","7-day free trial","Cancel anytime"].map(t=><span key={t} className="text-xs bg-orange-50 text-orange-700 font-semibold px-2.5 py-1 rounded-full">✓ {t}</span>)}</div>
              : <div className="mb-5"></div>}

            {err && <div className="bg-red-50 text-red-600 text-sm p-3 rounded-xl mb-3 border border-red-100">{err}</div>}

            <form onSubmit={submit}>
              {mode==="signup" && <input className="w-full p-3 mb-3 border border-slate-200 rounded-xl outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-100" placeholder="Business / Shop ka naam" value={f.org_name} onChange={set("org_name")} />}
              {mode==="signup" && <select className="w-full p-3 mb-3 border border-slate-200 rounded-xl outline-none bg-white focus:border-orange-500 focus:ring-2 focus:ring-orange-100" value={f.business_type} onChange={set("business_type")}>
                {BTYPES.map(([c,l])=><option key={c} value={c}>{l}</option>)}</select>}
              <input className="w-full p-3 mb-3 border border-slate-200 rounded-xl outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-100" placeholder="Username" value={f.username} onChange={set("username")} />
              {mode==="signup" && <input className="w-full p-3 mb-3 border border-slate-200 rounded-xl outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-100" placeholder="Email (optional)" value={f.email} onChange={set("email")} />}
              <div className="relative mb-5">
                <input className="w-full p-3 pr-16 border border-slate-200 rounded-xl outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-100" type={showPass?"text":"password"} placeholder="Password" value={f.password} onChange={set("password")} />

// ---------- Subscribe / Plans ----------
function Subscribe({sub,onActivated}){
  const [plans,setPlans]=useState([]),[cycle,setCycle]=useState("MONTHLY"),[busy,setBusy]=useState(""),[err,setErr]=useState("");
  useEffect(()=>{ api("/plans/").then(setPlans).catch(console.error); },[]);
  const pay=async(plan)=>{ setErr(""); setBusy(plan.code);
    try{
      const o=await api("/subscription/create_order/",{method:"POST",body:JSON.stringify({plan_code:plan.code,cycle})});
      if(o.dev_mode){ // bina real gateway ke activate (local testing)
        const v=await api("/subscription/verify/",{method:"POST",body:JSON.stringify({razorpay_order_id:o.order_id})});
        onActivated(v.subscription); setBusy(""); return;
      }
      const rzp=new Razorpay({ key:o.key_id, amount:o.amount, currency:o.currency, order_id:o.order_id,
        name:"Digital Munshi ERP", description:`${o.plan} (${cycle})`,
        handler:async(resp)=>{ const v=await api("/subscription/verify/",{method:"POST",body:JSON.stringify({
            razorpay_order_id:resp.razorpay_order_id, razorpay_payment_id:resp.razorpay_payment_id, razorpay_signature:resp.razorpay_signature})});
          onActivated(v.subscription); },
        theme:{color:"#1F4E79"} });
      rzp.open(); setBusy("");
    }catch(e){ setErr(JSON.stringify(e)); setBusy(""); } };
  const expired = sub && !sub.access_allowed;
  return (
    <div className="p-6">
      <h2 className="text-xl font-bold text-slate-700 mb-1">Subscription Plans</h2>
      {expired
        ? <div className="bg-red-50 text-red-600 p-3 rounded mb-4">Aapka trial/plan khatam ho gaya hai. Aage badhne ke liye plan choose karein.</div>
        : <p className="text-slate-500 mb-4">Trial chal raha hai — kabhi bhi upgrade kar sakte hain.</p>}
      {err && <div className="bg-red-50 text-red-600 p-2 rounded mb-3 text-sm">{err}</div>}
      <div className="inline-flex bg-slate-200 rounded-lg p-1 mb-5">
        {["MONTHLY","YEARLY"].map(cy=><button key={cy} onClick={()=>setCycle(cy)} className={"px-4 py-1 rounded-md text-sm font-medium "+(cycle===cy?"bg-white shadow":"text-slate-500")}>{cy==="MONTHLY"?"Monthly":"Yearly (2 mahine free)"}</button>)}
      </div>
      <div className="grid md:grid-cols-3 gap-4">
        {plans.map(p=>{ const price=cycle==="YEARLY"?p.price_yearly:p.price_monthly; const pop=p.code==="pro";
          return (
          <div key={p.id} className={"card p-5 "+(pop?"ring-2 ring-blue-700":"")}>
            {pop && <div className="text-xs bg-blue-700 text-white inline-block px-2 py-0.5 rounded mb-2">Popular</div>}
            <div className="text-lg font-bold text-slate-700">{p.name}</div>
            <div className="text-3xl font-bold text-blue-900 my-2">{money(price)}<span className="text-sm font-normal text-slate-400">/{cycle==="YEARLY"?"yr":"mo"}</span></div>
            <ul className="text-sm text-slate-600 space-y-1 mb-4">
              <li>👥 {p.max_users===0?"Unlimited":p.max_users} users</li>
              {(p.features||[]).map((f,i)=><li key={i}>✓ {f}</li>)}
            </ul>
            <button disabled={busy===p.code} onClick={()=>pay(p)} className="bg-blue-900 text-white w-full py-2 rounded font-semibold disabled:opacity-50">{busy===p.code?"…":"Choose Plan"}</button>
          </div>);})}
      </div>
    </div>);
}

                  <select className={cell} value={f.opening_godown} onChange={e=>set("opening_godown",e.target.value)}>{godowns.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}</select></div>

            {tab==="variant" && <div className="space-y-2">

                    <input type="number" className={cell+" w-20"} placeholder="Qty" value={c.quantity} onChange={e=>set("components",f.components.map((x,j)=>j===i?{...x,quantity:e.target.value}:x))}/>

        </div>

}

// ---------- New Sale / Transaction window (deck slide 7) ----------
function NewSale({initialDoc}){
  const [parties,setParties]=useState([]),[godowns,setGodowns]=useState([]),[units,setUnits]=useState([]),[items,setItems]=useState([]);
  const [profile,setProfile]=useState({});
  const [party,setParty]=useState(""),[godown,setGodown]=useState(""),[date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [docType,setDocType]=useState(initialDoc||"SALE");
  const [payMode,setPayMode]=useState("CREDIT"),[received,setReceived]=useState(""),[mode,setMode]=useState("CASH");
  const [barcode,setBarcode]=useState(""),[expand,setExpand]=useState(-1);
  const [priceLists,setPriceLists]=useState([]),[plId,setPlId]=useState("");
  const [currency,setCurrency]=useState("INR"),[fx,setFx]=useState(1);
  const [lines,setLines]=useState([blank()]); const [done,setDone]=useState(null),[err,setErr]=useState("");
  const applyPriceList=id=>{ setPlId(id); const pl=priceLists.find(x=>x.id==id); if(!pl)return;
    setLines(ls=>ls.map(l=>{ if(!l.variant)return l; const it=(pl.items||[]).find(x=>x.variant==l.variant); return it?{...l,rate:+it.price}:l; })); };
  const DOCS=[["SALE","Tax Invoice"],["PURCHASE","Purchase"],["ESTIMATE","Estimate / Quotation"],["PROFORMA","Proforma Invoice"],["SALE_ORDER","Sale Order"],["DELIVERY_CHALLAN","Delivery Challan"],["SALE_RETURN","Sale Return / Credit Note"]];
  function blank(){ return {variant:"",unit:"",qty:1,rate:0,incl:false,mrp:0,disc1_pct:0,disc2_pct:0,disc3_pct:0,discount_amount:0,tax_percent:18,cess_percent:0,free_qty:0,batch:""}; }
  useEffect(()=>{ apiList("/parties/?page_size=500").then(setParties); apiList("/godowns/").then(g=>{setGodowns(g);if(g[0])setGodown(g[0].id);});
    apiList("/units/").then(setUnits); apiList("/items/?page_size=500").then(setItems);
    apiList("/price-lists/").then(setPriceLists).catch(()=>{});
    api("/business-profile/").then(setProfile).catch(()=>{}); },[]);
  const unitsById={}; units.forEach(u=>unitsById[u.id]=u);
  // flat variants with full item context
  const variants=[]; items.forEach(it=>(it.variants||[]).forEach(v=>variants.push({
    id:v.id, label:it.name+(v.size||v.colour||v.model?` (${[v.size,v.colour,v.model].filter(Boolean).join(" ")})`:""),
    code:v.item_code, item:it, prices:v.unit_prices||[], batches:v.batches||[] })));
  const vById=id=>variants.find(x=>x.id==id);
  const itemUnits=v=>{ if(!v) return []; const out=[]; if(v.item.primary_unit)out.push(v.item.primary_unit);
    if(v.item.secondary_unit&&v.item.secondary_unit!==v.item.primary_unit)out.push(v.item.secondary_unit); return out; };
  const priceFor=(v,unitId)=>{ const p=(v.prices||[]).find(x=>x.unit==unitId); if(p&&+p.sale_price)return +p.sale_price;
    return +v.item.mrp||0; };
  const taxFor=v=>{ /* item.tax_rate is id; profile may carry default. fallback 18 */ return 18; };
  const setLine=(i,k,val)=>{ setLines(ls=>{ const n=ls.map((l,j)=>j===i?{...l,[k]:val}:l);
    if(k==="variant"){ const v=vById(val); if(v){ const u=v.item.primary_unit; n[i].unit=u; n[i].rate=priceFor(v,u); n[i].mrp=+v.item.mrp||0; n[i].tax_percent=taxFor(v); n[i].batch=""; } }
    if(k==="unit"){ const v=vById(n[i].variant); if(v) n[i].rate=priceFor(v,val); }
    if(k==="batch"){ const v=vById(n[i].variant); const b=(v&&v.batches||[]).find(x=>x.id==val); if(b){ if(+b.mrp)n[i].mrp=+b.mrp;
      if(+b.discount_value){ if(b.discount_type==="PERCENT")n[i].disc1_pct=+b.discount_value; else n[i].discount_amount=+b.discount_value; } } }
    return n; }); };
  const qtyPrimary=l=>{ const v=vById(l.variant); if(!v)return +l.qty||0;
    if(v.item.secondary_unit&&l.unit==v.item.secondary_unit) return (+l.qty||0)*(+v.item.conversion_factor||1); return +l.qty||0; };
  // mirror backend VoucherLine.compute
  const calc=l=>{ const qty=+l.qty||0,rate=+l.rate||0,taxp=+l.tax_percent||0,cessp=+l.cess_percent||0;
    const gross=rate*qty; let base=(l.incl&&taxp>0)?gross/(1+taxp/100):gross;
    let after=base*(1-(+l.disc1_pct||0)/100)*(1-(+l.disc2_pct||0)/100)*(1-(+l.disc3_pct||0)/100)-(+l.discount_amount||0);
    if(after<0)after=0; const tax=after*taxp/100; const cess=after*cessp/100; return {gross,disc:base-after,taxable:after,tax,cess,total:after+tax+cess}; };
  const interState=(()=>{ const cs=(profile.state_code||"").trim(); const p=parties.find(x=>x.id==party);
    const ps=(p&&p.state_code||"").trim(); return cs&&ps?cs!==ps:false; })();
  const T=lines.reduce((a,l)=>{if(!l.variant)return a;const c=calc(l);a.gross+=c.gross;a.disc+=c.disc;a.taxable+=c.taxable;a.tax+=c.tax;a.cess+=c.cess;return a;},{gross:0,disc:0,taxable:0,tax:0,cess:0});
  const grand=Math.round(T.taxable+T.tax+T.cess); const roundOff=grand-(T.taxable+T.tax+T.cess);
  const balance=grand-(+received||0);
  const submit=async()=>{ setErr("");

    const payload={voucher_type:docType,date,party:+party,godown:+godown,company_state_code:profile.state_code||"",currency,exchange_rate:String(fx||1),

        disc1_pct:String(l.disc1_pct||0),disc2_pct:String(l.disc2_pct||0),disc3_pct:String(l.disc3_pct||0),discount_amount:String(l.discount_amount||0)}))};
    try{ const v=await api("/vouchers/",{method:"POST",body:JSON.stringify(payload)});
      if(["SALE","PURCHASE","SALE_RETURN","DELIVERY_CHALLAN"].includes(docType)) await api(`/vouchers/${v.id}/post_to_stock/`,{method:"POST"}).catch(()=>{});
      if(+received>0 && (docType==="SALE"||docType==="PURCHASE")){
        await api("/payments/",{method:"POST",body:JSON.stringify({payment_type:docType==="SALE"?"RECEIPT":"PAYMENT",date,party:+party,amount:String(received),mode})}).catch(()=>{}); }
      setDone(v); setLines([blank()]); setParty(""); setReceived("");
    }catch(e){ setErr(typeof e==="object"?JSON.stringify(e):String(e)); } };
  const cell="border border-slate-200 p-1.5 rounded-lg w-full text-sm";

    <div className="p-6 max-w-6xl fade-in">

            {[["CREDIT","Credit"],["CASH","Cash"]].map(([v,l])=><button key={v} onClick={()=>{setPayMode(v); if(v==="CASH")setReceived(String(grand||""));}}
              className="px-4 py-2 text-sm font-semibold" style={{background:payMode===v?"#ea6a1e":"#fff",color:payMode===v?"#fff":"#475569"}}>{l}</button>)}</div>
          <select className="border border-slate-200 p-2.5 rounded-xl text-sm" value={currency} onChange={e=>{const c=e.target.value;setCurrency(c);setFx(c==="INR"?1:fx);}} title="Currency">
            {["INR","USD","EUR","GBP","AED"].map(c=><option key={c} value={c}>{c}</option>)}</select>
          {currency!=="INR" && <input type="number" className="border border-slate-200 p-2.5 rounded-xl text-sm" style={{width:90}} value={fx} onChange={e=>setFx(e.target.value)} title="1 unit = ? INR" placeholder="Rate"/>}
          {priceLists.length>0 && <select className="border border-slate-200 p-2.5 rounded-xl text-sm" value={plId} onChange={e=>applyPriceList(e.target.value)} title="Price List apply">
            <option value="">Price List…</option>{priceLists.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>}
          <select className="border border-slate-200 p-2.5 rounded-xl font-semibold text-sm" value={docType} onChange={e=>setDocType(e.target.value)}>
            {DOCS.map(([c,l])=><option key={c} value={c}>{l}</option>)}</select>

function BarcodeDesigner(){
  const [items,setItems]=useState([]),[variants,setVariants]=useState([]);
  const [vid,setVid]=useState(""),[value,setValue]=useState(""),[name,setName]=useState(""),[price,setPrice]=useState("");
  const [sym,setSym]=useState("CODE128"),[w,setW]=useState(50),[h,setH]=useState(30),[copies,setCopies]=useState(24);
  const svgRef=useRef(null);
  useEffect(()=>{ apiList("/items/?page_size=500").then(its=>{ setItems(its);
    const vs=[]; its.forEach(it=>(it.variants||[]).forEach(v=>vs.push({id:v.id,label:it.name+(v.size||v.colour||v.model?` (${[v.size,v.colour,v.model].filter(Boolean).join(" ")})`:""),code:v.item_code,barcode:v.barcode,name:it.name,mrp:it.mrp})));
    setVariants(vs); if(vs[0]){ setVid(String(vs[0].id)); setValue(vs[0].barcode||vs[0].code||""); setName(vs[0].name); setPrice(vs[0].mrp||""); } }); },[]);
  const onPick=id=>{ setVid(id); const v=variants.find(x=>x.id==id); if(v){ setValue(v.barcode||v.code||""); setName(v.name); setPrice(v.mrp||""); } };
  useEffect(()=>{ if(svgRef.current && value && window.JsBarcode){ try{
    window.JsBarcode(svgRef.current,value,{format:sym==="EAN13"&&/^\d{12,13}$/.test(value)?"EAN13":"CODE128",width:2,height:48,fontSize:14,margin:6});
  }catch(e){ try{window.JsBarcode(svgRef.current,value||"000000",{format:"CODE128"});}catch(_){} } } },[value,sym]);
  const printSheet=()=>{ const win=window.open("","_blank"); const n=Math.max(1,+copies||1);
    let svg=""; try{ const tmp=document.createElement("svg"); }catch(e){}
    const inner=svgRef.current?svgRef.current.outerHTML:"";
    const label=`<div style="width:${w}mm;height:${h}mm;border:1px dashed #ccc;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;margin:1mm;padding:1mm;box-sizing:border-box;overflow:hidden">
      <div style="font:600 9pt sans-serif;text-align:center">${name||""}</div>${inner}
      <div style="font:700 10pt sans-serif;color:#059669">₹${price||""}</div></div>`;
    win.document.write(`<html><head><title>Labels</title></head><body style="margin:0;padding:4mm">${label.repeat(n)}
      <script>window.onload=function(){window.print();}<\/script></body></html>`); win.document.close(); };
  return (
    <div className="grid md:grid-cols-2 gap-5">
      <div className="card p-5 space-y-3">
        <div className="font-bold text-slate-700">🏷️ Barcode & Label Designer</div>
        <div><label className="text-xs font-semibold text-slate-500">Product</label>
          <select className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={vid} onChange={e=>onPick(e.target.value)}>{variants.map(v=><option key={v.id} value={v.id}>{v.label}</option>)}</select></div>
        <div><label className="text-xs font-semibold text-slate-500">Barcode value</label>
          <input className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={value} onChange={e=>setValue(e.target.value)}/></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="text-xs font-semibold text-slate-500">Symbology</label>
            <select className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={sym} onChange={e=>setSym(e.target.value)}><option value="CODE128">CODE-128</option><option value="EAN13">EAN-13</option></select></div>
          <div><label className="text-xs font-semibold text-slate-500">Copies</label>
            <input type="number" className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={copies} onChange={e=>setCopies(e.target.value)}/></div>
          <div><label className="text-xs font-semibold text-slate-500">Label width (mm)</label>
            <input type="number" className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={w} onChange={e=>setW(e.target.value)}/></div>
          <div><label className="text-xs font-semibold text-slate-500">Label height (mm)</label>
            <input type="number" className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={h} onChange={e=>setH(e.target.value)}/></div>
        </div>
        <button onClick={printSheet} className="text-white px-4 py-2.5 rounded-xl text-sm font-bold w-full" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>🖨 Print Labels</button>
      </div>
      <div className="card p-5">
        <div className="font-bold text-slate-700 mb-3">Preview</div>
        <div className="border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center p-6" style={{minHeight:200}}>
          <div className="font-bold text-slate-800">{name}</div>
          <svg ref={svgRef}></svg>
          <div className="text-lg font-extrabold" style={{color:"#059669"}}>₹{price}</div>
        </div>
        <div className="text-xs text-slate-400 mt-2">Label sheet: {w} × {h} mm · {copies} labels · {sym}</div>
      </div>
    </div>);
}

    </div>);
}

      else if(modal.type==="loans") await api("/loans/",{method:"POST",body:JSON.stringify({lender:f.lender||"",principal:String(f.principal||0),interest_rate:String(f.interest_rate||0),tenure_months:+f.tenure_months||12,start_date:f.start_date||null})});
      else if(modal.type==="expenses"){ let catId=f.category?+f.category:null;

        <div className="p-6 space-y-3">

          {modal.type==="accounts" && <>
            <div><label className="text-xs font-semibold text-slate-500">Account Name</label><input className={cell} value={f.name||""} onChange={e=>set("name",e.target.value)}/></div>

            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">A/c No</label><input className={cell} value={f.account_no||""} onChange={e=>set("account_no",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">IFSC</label><input className={cell} value={f.ifsc||""} onChange={e=>set("ifsc",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Bank Name</label><input className={cell} value={f.bank_name||""} onChange={e=>set("bank_name",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">UPI ID</label><input className={cell} value={f.upi_id||""} onChange={e=>set("upi_id",e.target.value)}/></div></div>
            <div><label className="text-xs font-semibold text-slate-500">Opening Balance</label><input type="number" className={cell} value={f.opening_balance||""} onChange={e=>set("opening_balance",e.target.value)}/></div></>}
          {modal.type==="txn" && <>
            <div className="text-sm text-slate-500">{modal.account.name}</div>

              <div><label className="text-xs font-semibold text-slate-500">Amount</label><input type="number" className={cell} value={f.amount||""} onChange={e=>set("amount",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Bank</label><input className={cell} value={f.bank_name||""} onChange={e=>set("bank_name",e.target.value)}/></div>

          {modal.type==="loans" && <>
            <div><label className="text-xs font-semibold text-slate-500">Lender / Bank</label><input className={cell} value={f.lender||""} onChange={e=>set("lender",e.target.value)}/></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Principal ₹</label><input type="number" className={cell} value={f.principal||""} onChange={e=>set("principal",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">Interest % (annual)</label><input type="number" className={cell} value={f.interest_rate||""} onChange={e=>set("interest_rate",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Tenure (months)</label><input type="number" className={cell} value={f.tenure_months||""} onChange={e=>set("tenure_months",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">Start Date</label><input type="date" className={cell} value={f.start_date||""} onChange={e=>set("start_date",e.target.value)}/></div></div></>}
          {modal.type==="expenses" && <>

// ---------- Sales / Transactions hub (Vyapar parity: type tabs + convert) ----------
function VouchersView({initialQuery,onNav}){
  const TABS=[["","All"],["SALE","Invoices"],["ESTIMATE","Estimates"],["PROFORMA","Proforma"],["SALE_ORDER","Sale Orders"],["DELIVERY_CHALLAN","Delivery Challan"],["SALE_RETURN","Credit Notes"],["PURCHASE","Purchases"],["RECURRING","↻ Recurring"]];
  const [type,setType]=useState(""),[rows,setRows]=useState([]),[parties,setParties]=useState([]),[q,setQ]=useState(initialQuery||""),[msg,setMsg]=useState("");
  const [recs,setRecs]=useState([]),[recFor,setRecFor]=useState(null);
  const load=()=>apiList("/vouchers/?page_size=500"+(type?"&type="+type:"")).then(setRows);
  const loadRecs=()=>apiList("/recurring-invoices/").then(setRecs);
  useEffect(()=>{ if(type!=="RECURRING")load(); else loadRecs(); },[type]);
  useEffect(()=>{ apiList("/parties/?page_size=500").then(setParties); loadRecs(); },[]);
  const genNow=async r=>{ try{ const x=await api(`/recurring-invoices/${r.id}/generate_now/`,{method:"POST"}); setMsg(`✓ ${x.number} generate hua — agla ${x.next_run}`); loadRecs(); setTimeout(()=>setMsg(""),3500);}catch(e){setMsg("Generate fail");} };
  const toggleRec=async r=>{ try{ await api(`/recurring-invoices/${r.id}/`,{method:"PATCH",body:JSON.stringify({is_active:!r.is_active})}); loadRecs();}catch(e){} };
  const pName=id=>{const p=parties.find(x=>x.id==id);return p?p.name:"—";};
  const convert=async(r,to)=>{ try{ const x=await api(`/vouchers/${r.id}/convert/`,{method:"POST",body:JSON.stringify({to})});
    setMsg(`✓ ${r.number} → ${x.number} (${to==="SALE"?"Invoice":to}) ban gaya`); load(); setTimeout(()=>setMsg(""),3500);
  }catch(e){ setMsg("Convert fail"); } };
  const canConvert=t=>["ESTIMATE","PROFORMA","SALE_ORDER","DELIVERY_CHALLAN"].includes(t);
  const filt=rows.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q.toLowerCase())||pName(r.party).toLowerCase().includes(q.toLowerCase()));
  const total=filt.reduce((a,r)=>a+Number(r.grand_total||0),0);
  return (
    <div className="p-6 fade-in">
      <div className="flex flex-wrap justify-between items-center gap-3 mb-4">
        <h2 className="text-2xl font-extrabold text-slate-800">Sales & Transactions</h2>
        <div className="flex gap-2 items-center">
          <div className="relative"><span className="absolute left-3 top-2.5 text-slate-400 text-sm">🔍</span>
            <input className="p-2.5 pl-9 text-sm rounded-xl border border-slate-200" style={{minWidth:220}} placeholder="Search no/party…" value={q} onChange={e=>setQ(e.target.value)} /></div>
          <button onClick={()=>onNav&&onNav("sale","SALE")} className="text-white px-4 py-2.5 rounded-xl text-sm font-bold" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>+ New</button>
        </div>
      </div>
      {msg && <div className="rounded-xl p-2.5 mb-3 text-sm font-semibold" style={{background:"#ecfdf5",color:"#166534",border:"1px solid #a7f3d0"}}>{msg}</div>}
      <div className="flex gap-2 flex-wrap mb-4">
        {TABS.map(([t,l])=><button key={t} onClick={()=>setType(t)} className="px-3.5 py-1.5 rounded-full text-sm font-semibold" style={{background:type===t?"#ea6a1e":"#fff",color:type===t?"#fff":"#64748b",border:"1px solid "+(type===t?"#ea6a1e":"#e2e8f0")}}>{l}</button>)}
      </div>
      {type==="RECURRING"
        ? <div className="card overflow-x-auto"><table className="w-full text-sm" style={{minWidth:760}}>
            <thead className="bg-slate-100 text-slate-600"><tr><th className="text-left p-2.5">Name</th><th className="text-left p-2.5">Party</th><th className="text-left p-2.5">Frequency</th><th className="text-left p-2.5">Next Run</th><th className="text-right p-2.5">Amount</th><th className="text-center p-2.5">Generated</th><th className="text-center p-2.5">Status</th><th className="text-right p-2.5">Actions</th></tr></thead>
            <tbody>{recs.length===0 && <tr><td className="p-3 text-slate-400" colSpan={8}>Koi recurring invoice nahi — kisi Invoice ke "↻ Recur" se banao (monthly AMC, rent, contracts)</td></tr>}
              {recs.map(r=><tr key={r.id} className="border-b hover:bg-slate-50"><td className="p-2.5 font-semibold">{r.name}</td><td className="p-2.5">{r.party_name}</td>
                <td className="p-2.5 text-xs">{r.frequency}</td><td className="p-2.5 text-xs">{r.next_run}</td><td className="p-2.5 text-right font-semibold">{money(r.amount)}</td>
                <td className="p-2.5 text-center">{r.generated_count}</td>
                <td className="p-2.5 text-center">{r.is_active?<span className="text-xs text-green-600">● Active</span>:<span className="text-xs text-slate-400">Paused</span>}</td>
                <td className="p-2.5 text-right whitespace-nowrap"><button onClick={()=>genNow(r)} className="text-xs font-bold text-orange-700 mr-3">Generate Now</button>
                  <button onClick={()=>toggleRec(r)} className="text-xs font-semibold text-blue-700">{r.is_active?"Pause":"Resume"}</button></td></tr>)}
            </tbody></table></div>
        : <div className="card overflow-x-auto">
        <table className="w-full text-sm" style={{minWidth:760}}>
          <thead className="bg-slate-100 text-slate-600"><tr>
            <th className="text-left p-2.5">Number</th><th className="text-left p-2.5">Type</th><th className="text-left p-2.5">Date</th>
            <th className="text-left p-2.5">Party</th><th className="text-right p-2.5">Total</th><th className="text-center p-2.5">Status</th><th className="text-right p-2.5">Actions</th></tr></thead>
          <tbody>
            {filt.length===0 && <tr><td className="p-3 text-slate-400" colSpan={7}>Koi transaction nahi</td></tr>}
            {filt.map(r=><tr key={r.id} className="border-b hover:bg-slate-50">
              <td className="p-2.5 font-semibold text-slate-700">{r.number}</td>
              <td className="p-2.5 text-xs">{(TABS.find(t=>t[0]===r.voucher_type)||[,r.voucher_type])[1]}</td>
              <td className="p-2.5 text-xs">{r.date}</td><td className="p-2.5">{pName(r.party)}</td>
              <td className="p-2.5 text-right font-semibold">{money(r.grand_total)}</td>
              <td className="p-2.5 text-center">{r.is_posted?<span className="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700">Posted</span>:<span className="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">Open</span>}</td>
              <td className="p-2.5 text-right whitespace-nowrap">
                {canConvert(r.voucher_type) && <button onClick={()=>convert(r,"SALE")} className="text-xs font-bold text-orange-700 mr-3 hover:underline">→ Invoice</button>}
                {r.voucher_type==="SALE" && <button onClick={()=>setRecFor(r)} className="text-xs font-semibold text-purple-700 mr-3" title="Recurring banao">↻ Recur</button>}
                <button onClick={async()=>{try{const x=await api(`/vouchers/${r.id}/email/`,{method:"POST",body:JSON.stringify({})});setMsg(x.sent?`✓ Email bheja ${x.to}`:`Email: ${x.to||"party ka email nahi"}`);setTimeout(()=>setMsg(""),3000);}catch(e){setMsg("Email fail — party ka email add karein");setTimeout(()=>setMsg(""),3000);}}} className="text-blue-600 text-xs font-semibold mr-3">Email</button>
                <button onClick={()=>shareWhatsApp(r.id)} className="text-emerald-600 text-xs font-semibold mr-3">WhatsApp</button>
                <a className="text-blue-700 text-xs font-semibold" href={`/invoice/${r.id}/?token=`+getToken()} target="_blank">Print</a>
              </td>
            </tr>)}
          </tbody>
          <tfoot><tr className="bg-slate-50 font-bold"><td className="p-2.5" colSpan={4}>Total ({filt.length})</td><td className="p-2.5 text-right" style={{color:"#c2410c"}}>{money(total)}</td><td colSpan={2}></td></tr></tfoot>
        </table>
      </div>}
      {recFor && <RecurringModal voucher={recFor} onClose={()=>setRecFor(null)} onSaved={()=>{setRecFor(null);loadRecs();setMsg("✓ Recurring set ho gaya");setTimeout(()=>setMsg(""),3000);}}/>}
    </div>);
}

              <label className="bg-slate-200 px-3 py-2 rounded-lg cursor-pointer">✍ Signature upload
                <input type="file" accept="image/*" className="hidden" onChange={async e=>{const fd=new FormData();fd.append("signature",e.target.files[0]);await fetch(API+"/business-profile/signature/",{method:"POST",headers:{Authorization:"Bearer "+getToken()},body:fd});setMsg("Signature uploaded ✓ (invoice par print hoga)");}} /></label>
              <a href="#" onClick={e=>{e.preventDefault();fetch(API+"/items-export/",{headers:{Authorization:"Bearer "+getToken()}}).then(r=>r.blob()).then(b=>{const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="items.csv";a.click();});}} className="bg-slate-200 px-3 py-2 rounded-lg">Export Items CSV</a>
              <a href="#" onClick={e=>{e.preventDefault();fetch(API+"/parties-export/",{headers:{Authorization:"Bearer "+getToken()}}).then(r=>r.blob()).then(b=>{const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="parties.csv";a.click();});}} className="bg-slate-200 px-3 py-2 rounded-lg">Export Parties CSV</a>

          <button onClick={save} className="mt-4 text-white px-6 py-2.5 rounded-xl font-bold" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>Save Settings</button>

// ---------- Reports ----------
function RTable({head,rows}){
  return (<div className="card overflow-auto"><table className="w-full text-sm">
    <thead><tr>{head.map((h,i)=><th key={i} className={"p-3 "+(i===0?"text-left":"text-right")}>{h}</th>)}</tr></thead>
    <tbody>{rows.length===0&&<tr><td className="p-4 text-slate-400" colSpan={head.length}>Koi data nahi</td></tr>}
      {rows.map((r,i)=><tr key={i} className="border-b">{r.map((c,j)=><td key={j} className={"p-3 "+(j===0?"text-left":"text-right")}>{c}</td>)}</tr>)}</tbody>
  </table></div>);
}
function StatCard({label,value,accent}){
  return (<div className="card p-5"><div className="text-xs font-semibold uppercase tracking-wider text-slate-400">{label}</div>
    <div className="text-2xl font-extrabold mt-2" style={{color:accent||"#0f172a"}}>{value}</div></div>);
}
function ReportsView(){

function StaffView(){
  const [rows,setRows]=useState([]),[meta,setMeta]=useState({used:0,max_users:0,plan:"",can_add:true});
  const [f,setF]=useState({username:"",password:"",role:"OPERATOR",phone:""}),[msg,setMsg]=useState(""),[err,setErr]=useState(""),[busy,setBusy]=useState(false);

  const roleColor={ADMIN:["#fef3c7","#92400e"],ACCOUNTANT:["#dbeafe","#1e40af"],OPERATOR:["#dcfce7","#166534"],VIEWER:["#f1f5f9","#64748b"]};

      <div className="card p-4 mb-4 grid md:grid-cols-5 gap-2 items-end">
        <input className={cell} placeholder="Username" value={f.username} onChange={e=>setF({...f,username:e.target.value})} />
        <input className={cell} placeholder="Password" value={f.password} onChange={e=>setF({...f,password:e.target.value})} />
        <input className={cell} placeholder="Phone (optional)" value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} />
        <select className={cell} value={f.role} onChange={e=>setF({...f,role:e.target.value})}>
          <option value="ADMIN">Admin (Owner)</option><option value="ACCOUNTANT">Accountant</option><option value="OPERATOR">Billing Operator</option><option value="VIEWER">Viewer</option></select>
        <button onClick={add} disabled={busy||limitReached} className="text-white p-2 rounded-lg font-bold" style={{background:limitReached?"#cbd5e1":"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>{busy?"…":"+ Add Staff"}</button>

        <tbody>{rows.length===0&&<tr><td className="p-3 text-slate-400" colSpan={5}>Sirf aap (owner). Staff add karein.</td></tr>}
          {rows.map(r=>{const c=roleColor[r.role]||roleColor.VIEWER;return <tr key={r.id} className="border-b hover:bg-slate-50">
            <td className="p-2.5 font-semibold text-slate-700">{r.username}</td><td className="p-2.5 text-xs">{r.phone||"—"}</td>

// ---------- 58mm thermal receipt print ----------
function thermalPrint(store, num, date, cart, totals, received){
  const w=window.open("","_blank","width=320,height=600");
  const rows=cart.map(c=>`<tr><td colspan="3" style="padding-top:3px">${c.label}</td></tr>
    <tr><td>${c.qty} x ${c.rate.toFixed(2)}</td><td></td><td style="text-align:right">${(c.qty*c.rate).toFixed(2)}</td></tr>`).join("");
  w.document.write(`<html><head><title>Receipt ${num}</title><style>
    *{font-family:'Courier New',monospace;font-size:12px;margin:0;color:#000}
    body{width:58mm;padding:4px}h2{font-size:14px;text-align:center;margin:4px 0}
    table{width:100%;border-collapse:collapse}.c{text-align:center}.line{border-top:1px dashed #000;margin:4px 0}
    .tot{display:flex;justify-content:space-between;font-weight:bold}</style></head><body>
    <h2>${store}</h2><div class="c">${date} · ${num}</div><div class="line"></div>
    <table>${rows}</table><div class="line"></div>
    <div class="tot"><span>Sub</span><span>${totals.taxable.toFixed(2)}</span></div>
    <div class="tot"><span>Tax</span><span>${totals.tax.toFixed(2)}</span></div>
    <div class="tot" style="font-size:14px"><span>TOTAL</span><span>${totals.total.toFixed(2)}</span></div>
    <div class="tot"><span>Cash</span><span>${(received||totals.total).toFixed(2)}</span></div>
    <div class="line"></div><div class="c">Dhanyavaad! Phir aaiye 🙏</div>
    <script>window.onload=function(){window.print();}<\/script></body></html>`);
  w.document.close();
}

// ---------- POS quick-bill (Swipe/Aronium style cashier) ----------
function POSView(){
  const [items,setItems]=useState([]),[godowns,setGodowns]=useState([]),[party,setParty]=useState(""),[parties,setParties]=useState([]);
  const [q,setQ]=useState(""),[cart,setCart]=useState([]),[received,setReceived]=useState(""),[done,setDone]=useState(null),[err,setErr]=useState("");
  const scanRef=useRef(null);
  useEffect(()=>{ apiList("/items/?page_size=500").then(setItems); apiList("/godowns/").then(setGodowns);
    apiList("/parties/?page_size=500").then(setParties); if(scanRef.current)scanRef.current.focus(); },[]);
  const variants=[]; items.forEach(it=>(it.variants||[]).forEach(v=>variants.push({id:v.id,label:it.name+(v.size||v.colour||v.model?` (${[v.size,v.colour,v.model].filter(Boolean).join(" ")})`:""),code:v.item_code,barcode:v.barcode,unit:it.primary_unit,rate:(v.unit_prices&&v.unit_prices[0]&&+v.unit_prices[0].sale_price)||+it.mrp||0,tax:18})));
  const add=v=>{ setCart(c=>{ const i=c.findIndex(x=>x.id===v.id); if(i>=0){ const n=[...c]; n[i]={...n[i],qty:n[i].qty+1}; return n; }
    return [...c,{id:v.id,label:v.label,unit:v.unit,rate:v.rate,tax:v.tax,qty:1}]; }); };
  const setQty=(i,d)=>setCart(c=>{ const n=[...c]; n[i]={...n[i],qty:Math.max(0,n[i].qty+d)}; return n.filter(x=>x.qty>0); });
  const totals=cart.reduce((a,c)=>{const base=c.qty*c.rate;const tax=base*c.tax/100;a.taxable+=base;a.tax+=tax;a.total+=base+tax;return a;},{taxable:0,tax:0,total:0});
  const filt=variants.filter(v=>!q||v.label.toLowerCase().includes(q.toLowerCase())||(v.code||"").toLowerCase().includes(q.toLowerCase()));
  const scanEnter=async()=>{ const code=q.trim(); if(!code)return; const v=variants.find(x=>x.barcode===code||x.code===code);
    if(v){ add(v); setQ(""); } };
  const checkout=async()=>{ setErr(""); if(cart.length===0){setErr("Cart khaali hai");return;}
    if(!godowns[0]){setErr("Pehle ek godown banao (Items se)");return;}
    let pid=party; if(!pid){ const walk=parties.find(p=>/walk/i.test(p.name)); if(walk)pid=walk.id;
      else { try{const np=await api("/parties/",{method:"POST",body:JSON.stringify({name:"Walk-in Customer",party_type:"CUSTOMER"})});pid=np.id;setParties(x=>[...x,np]);}catch(e){} } }
    const payload={voucher_type:"SALE",date:new Date().toISOString().slice(0,10),party:+pid,godown:godowns[0].id,company_state_code:"",
      lines:cart.map(c=>({variant:c.id,unit:c.unit,qty:String(c.qty),rate:String(c.rate),tax_percent:String(c.tax),disc1_pct:"0"}))};
    try{ const v=await api("/vouchers/",{method:"POST",body:JSON.stringify(payload)});
      await api(`/vouchers/${v.id}/post_to_stock/`,{method:"POST"}).catch(()=>{});
      if(+received>0) await api("/payments/",{method:"POST",body:JSON.stringify({payment_type:"RECEIPT",date:payload.date,party:+pid,amount:String(received),mode:"CASH"})}).catch(()=>{});
      thermalPrint("Digital Munshi", v.number, payload.date, cart, totals, +received||totals.total);
      setDone(v); setCart([]); setReceived(""); setQ(""); if(scanRef.current)scanRef.current.focus();
    }catch(e){ setErr(typeof e==="object"?JSON.stringify(e):"Checkout fail"); } };
  return (
    <div className="p-4 fade-in grid md:grid-cols-3 gap-4" style={{height:"calc(100vh - 90px)"}}>
      <div className="md:col-span-2 flex flex-col min-h-0">
        <div className="flex gap-2 mb-3">
          <input ref={scanRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();scanEnter();}}}
            placeholder="📷 Scan barcode ya item search…" className="flex-1 border border-slate-200 p-3 rounded-xl text-sm" />
        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-2 overflow-y-auto pr-1">
          {filt.slice(0,60).map(v=><button key={v.id} onClick={()=>add(v)} className="card p-3 text-left hover-lift">
            <div className="text-sm font-semibold text-slate-700 truncate">{v.label}</div>
            <div className="text-xs text-slate-400">{v.code}</div>
            <div className="text-sm font-bold mt-1" style={{color:"#c2410c"}}>{money(v.rate)}</div></button>)}
        </div>
      </div>
      <div className="card p-4 flex flex-col min-h-0">
        <div className="flex items-center justify-between mb-2">
          <div className="font-bold text-slate-700">🧾 Cart</div>
          <select className="text-xs border border-slate-200 rounded-lg p-1.5" value={party} onChange={e=>setParty(e.target.value)}>
            <option value="">Walk-in</option>{parties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
        </div>
        {done && <div className="text-xs rounded-lg p-2 mb-2" style={{background:"#ecfdf5",color:"#166534"}}>✓ {done.number} — {money(done.grand_total)} · receipt printed</div>}
        {err && <div className="text-xs rounded-lg p-2 mb-2 bg-red-50 text-red-600">{err}</div>}
        <div className="flex-1 overflow-y-auto">
          {cart.length===0 && <div className="text-sm text-slate-400 text-center mt-6">Item pe click/scan karo</div>}
          {cart.map((c,i)=><div key={i} className="flex items-center justify-between py-2 border-b">

            <div className="flex items-center gap-1.5 shrink-0">

            </div></div>)}
        </div>
        <div className="border-t pt-2 mt-2">
          <div className="flex justify-between text-sm text-slate-500"><span>Tax</span><b>{money(totals.tax)}</b></div>
          <div className="flex justify-between text-xl font-extrabold" style={{color:"#c2410c"}}><span>Total</span><span>{money(totals.total)}</span></div>

          <button onClick={checkout} className="w-full mt-2 text-white py-3 rounded-xl font-bold text-base" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>Checkout & Print 🖨</button>
        </div>
      </div>
    </div>);
}

function JournalModal({je,accounts,onClose,onSaved}){
  const [f,setF]=useState(je),[err,setErr]=useState(""),[busy,setBusy]=useState(false);
  const cell="border border-slate-200 p-1.5 rounded-lg text-sm";
  const setLine=(i,k,v)=>setF(s=>({...s,lines:s.lines.map((l,j)=>j===i?{...l,[k]:v}:l)}));
  const dr=f.lines.reduce((a,l)=>a+(+l.debit||0),0), cr=f.lines.reduce((a,l)=>a+(+l.credit||0),0);
  const save=async()=>{ setErr("");
    if(dr!==cr){setErr(`Debit (${dr}) ≠ Credit (${cr})`);return;}
    if(dr===0){setErr("Amount 0 nahi");return;}
    const lines=f.lines.filter(l=>l.account&&((+l.debit||0)||(+l.credit||0))).map(l=>({account:+l.account,debit:String(l.debit||0),credit:String(l.credit||0)}));
    if(lines.length<2){setErr("Kam se kam 2 lines");return;}
    setBusy(true);
    try{ await api("/journals/",{method:"POST",body:JSON.stringify({date:f.date,narration:f.narration,reference:f.reference||"",lines})}); onSaved();
    }catch(e){ setErr(typeof e==="object"?(e.detail||JSON.stringify(e)):"Save fail"); setBusy(false);} };
  return (<div className="fixed inset-0 z-50 flex items-start justify-center pt-16 overflow-y-auto" style={{background:"rgba(15,23,42,.45)"}} onClick={onClose}>
    <div className="card my-8 w-full max-w-2xl overflow-hidden" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between px-6 py-4" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}><h3 className="text-white font-bold">Manual Journal Entry</h3><button onClick={onClose} className="text-white text-xl">×</button></div>
      <div className="p-6 space-y-3">{err&&<div className="bg-red-50 text-red-700 text-sm p-2 rounded-lg">{err}</div>}
        <div className="grid grid-cols-3 gap-3"><div><label className="text-xs font-semibold text-slate-500">Date</label><input type="date" className={cell+" w-full mt-1"} value={f.date} onChange={e=>setF({...f,date:e.target.value})}/></div>
          <div className="col-span-2"><label className="text-xs font-semibold text-slate-500">Narration</label><input className={cell+" w-full mt-1"} value={f.narration} onChange={e=>setF({...f,narration:e.target.value})}/></div></div>
        <table className="w-full text-sm"><thead className="bg-slate-100 text-slate-600"><tr><th className="text-left p-2">Account</th><th className="text-right p-2 w-28">Debit</th><th className="text-right p-2 w-28">Credit</th><th></th></tr></thead>
          <tbody>{f.lines.map((l,i)=><tr key={i} className="border-b"><td className="p-1"><select className={cell+" w-full"} value={l.account} onChange={e=>setLine(i,"account",e.target.value)}><option value="">— account —</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.code} · {a.name}</option>)}</select></td>
            <td className="p-1"><input type="number" className={cell+" w-full text-right"} value={l.debit} onChange={e=>setLine(i,"debit",e.target.value)}/></td>
            <td className="p-1"><input type="number" className={cell+" w-full text-right"} value={l.credit} onChange={e=>setLine(i,"credit",e.target.value)}/></td>
            <td className="p-1"><button onClick={()=>setF(s=>({...s,lines:s.lines.filter((_,j)=>j!==i)}))} className="text-red-500 px-1">×</button></td></tr>)}</tbody>
          <tfoot><tr className="font-bold"><td className="p-2 text-right">Total</td><td className="p-2 text-right" style={{color:dr===cr?"#059669":"#dc2626"}}>{dr.toFixed(2)}</td><td className="p-2 text-right" style={{color:dr===cr?"#059669":"#dc2626"}}>{cr.toFixed(2)}</td><td></td></tr></tfoot>
        </table>
        <button onClick={()=>setF(s=>({...s,lines:[...s.lines,{account:"",debit:"",credit:""}]}))} className="text-orange-700 text-sm font-semibold">+ Add line</button>
      </div>
      <div className="flex justify-end gap-2 px-6 py-4 bg-slate-50 border-t"><button onClick={onClose} className="px-4 py-2 rounded-lg text-sm font-semibold text-slate-600">Cancel</button>
        <button onClick={save} disabled={busy} className="px-5 py-2 rounded-lg text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>{busy?"…":"Post Journal"}</button></div>
    </div></div>);
}

// ---------- Multi-firm switcher (sidebar) ----------
function FirmSwitcher(){
  const [firms,setFirms]=useState([]),[open,setOpen]=useState(false),[adding,setAdding]=useState(false),[name,setName]=useState(""),[btype,setBtype]=useState("GENERAL"),[busy,setBusy]=useState(false);
  const load=()=>apiList("/firms/").then(setFirms).catch(()=>{});
  useEffect(()=>{ load(); },[]);
  const active=firms.find(f=>f.active)||firms[0];
  const switchTo=async id=>{ try{ await api("/firms/switch/",{method:"POST",body:JSON.stringify({org_id:id})}); location.reload(); }catch(e){} };
  const add=async()=>{ if(!name.trim())return; setBusy(true);
    try{ await api("/firms/",{method:"POST",body:JSON.stringify({name:name.trim(),business_type:btype})}); setName(""); setAdding(false); load(); }catch(e){} setBusy(false); };
  if(firms.length===0) return null;
  return (
    <div className="hidden md:block relative px-1 mb-1">
      <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between gap-2 rounded-xl px-2.5 py-2 text-left" style={{background:"rgba(255,255,255,.12)"}}>
        <span className="text-xs font-semibold truncate" style={{color:"#fff"}}>🏢 {active?active.name:"Firm"}</span>
        <span className="text-xs" style={{color:"rgba(255,255,255,.7)"}}>▾</span>
      </button>
      {open && <div className="absolute left-1 right-1 mt-1 z-30 card p-1" style={{background:"#fff"}}>
        {firms.map(f=><button key={f.id} onClick={()=>switchTo(f.id)} className="w-full text-left px-3 py-2 rounded-lg text-sm flex items-center justify-between hover:bg-orange-50">
          <span className="font-semibold text-slate-700 truncate">{f.name}</span>{f.active&&<span className="text-xs text-green-600">● active</span>}</button>)}
        <div className="border-t mt-1 pt-1">
          {!adding ? <button onClick={()=>setAdding(true)} className="w-full text-left px-3 py-2 rounded-lg text-sm font-semibold text-orange-700 hover:bg-orange-50">+ Add Firm</button>
          : <div className="p-2 space-y-2">
            <input autoFocus className="border border-slate-200 p-1.5 rounded-lg w-full text-sm" placeholder="Firm naam" value={name} onChange={e=>setName(e.target.value)} />
            <select className="border border-slate-200 p-1.5 rounded-lg w-full text-sm" value={btype} onChange={e=>setBtype(e.target.value)}>
              <option value="GENERAL">General</option><option value="RETAIL">Retail / Kirana</option><option value="WHOLESALE">Wholesale</option><option value="RESTAURANT">Restaurant</option><option value="PHARMACY">Pharmacy</option><option value="SERVICE">Service</option><option value="MANUFACTURER">Manufacturer</option></select>
            <div className="flex gap-2"><button onClick={add} disabled={busy} className="flex-1 text-white py-1.5 rounded-lg text-sm font-bold" style={{background:"#ea6a1e"}}>{busy?"…":"Create"}</button>
              <button onClick={()=>setAdding(false)} className="px-3 text-sm text-slate-500">×</button></div>
          </div>}
        </div>
      </div>}
    </div>);
}

// ---------- Command Palette (Ctrl/Cmd + K) ----------
function CommandPalette({nav,onGo,onClose}){
  const [q,setQ]=useState(""); const ref=useRef(null);
  useEffect(()=>{ if(ref.current)ref.current.focus(); },[]);
  const actions=[
    {label:"New Sale / Invoice",hint:"Naya bill banao",go:()=>onGo("sale","SALE")},
    {label:"New Purchase",hint:"Purchase entry",go:()=>onGo("sale","PURCHASE")},
    {label:"Add Expense",hint:"Kharcha add karo",go:()=>onGo("cashbank")},
    {label:"Payment Reminders",hint:"Overdue parties",go:()=>onGo("reports")},
    {label:"Barcode & Labels",hint:"Label print",go:()=>onGo("utils")},
    ...nav.map(([k,l])=>({label:l,hint:"Open",go:()=>onGo(k)})),
  ];
  const filt=actions.filter(a=>!q||a.label.toLowerCase().includes(q.toLowerCase()));
  const run=a=>{ a.go(); onClose(); };
  return (
    <div className="fixed inset-0 z-[60] flex items-start justify-center pt-24" style={{background:"rgba(15,23,42,.5)"}} onClick={onClose}>
      <div className="card w-full max-w-xl overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-2 px-4 py-3 border-b">
          <span className="text-slate-400">⌘</span>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Kuch bhi karo — type karo (e.g. sale, party, report)…"
            onKeyDown={e=>{if(e.key==="Enter"&&filt[0])run(filt[0]); if(e.key==="Escape")onClose();}}
            className="flex-1 outline-none text-sm" />
          <span className="text-xs text-slate-400 border rounded px-1.5 py-0.5">Esc</span>
        </div>
        <div className="max-h-80 overflow-y-auto">
          {filt.length===0 && <div className="p-4 text-sm text-slate-400">Kuch nahi mila</div>}
          {filt.map((a,i)=><button key={i} onClick={()=>run(a)} className="w-full text-left px-4 py-2.5 hover:bg-orange-50 flex items-center justify-between border-b border-slate-50">
            <span className="text-sm font-semibold text-slate-700">{a.label}</span><span className="text-xs text-slate-400">{a.hint}</span></button>)}
        </div>
      </div>
    </div>);
}

function App(){
  const [authed,setAuthed]=useState(!!getToken());
  const [cmdOpen,setCmdOpen]=useState(false);
  useEffect(()=>{ const h=e=>{ if((e.metaKey||e.ctrlKey)&&(e.key==="k"||e.key==="K")){ e.preventDefault(); setCmdOpen(o=>!o); } };
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[]);
  const [tab,setTab]=useState("dash");
  const [sub,setSub]=useState(null),[loaded,setLoaded]=useState(false),[me,setMe]=useState(null);
  const [open,setOpen]=useState(false);
  const [saleMode,setSaleMode]=useState("SALE");
  const [gsearch,setGsearch]=useState("");
  const [theme,setTheme]=useState(()=>localStorage.getItem("dm_theme")||"light");
  useEffect(()=>{ document.body.dataset.theme=theme; localStorage.setItem("dm_theme",theme); },[theme]);
  const loadSub=()=>api("/subscription/").then(s=>{setSub(s);setLoaded(true);}).catch(()=>setLoaded(true));
  useEffect(()=>{ if(authed){ loadSub(); api("/me/").then(setMe).catch(()=>{}); } },[authed]);
  if(!authed) return <Login onLogin={()=>setAuthed(true)} />;
  const expired = loaded && sub && !sub.access_allowed;
  const isAdmin = me && me.is_platform_admin;
  const toggleTheme=()=>setTheme(t=>t==="dark"?"light":"dark");
  const logout=()=>{ clearAuth(); setAuthed(false); setSub(null); };
  const nav=[["dash","Dashboard"],["pos","POS Billing"],["sale","New Sale"],["vouchers","Sales & Transactions"],["items","Items"],["parties","Parties"],["cashbank","Cash & Bank"],["accounting","Accounting"],["reports","Reports"],["utils","Utilities"],["whatsapp","WhatsApp"],["hr","HR / Payroll"],["staff","App Users"],["settings","Settings"],["plan","Subscription"]];
  if(isAdmin) nav.push(["admin","Platform Admin"]);
  const onActivated=s=>{ setSub(s); setTab("dash"); };
  const go=(k,mode)=>{ setTab(k); if(mode)setSaleMode(mode); setOpen(false); };
  return (
    <div className="md:flex md:h-screen md:overflow-hidden">
      {cmdOpen && <CommandPalette nav={nav} onGo={go} onClose={()=>setCmdOpen(false)} />}
      {/* Mobile top bar */}
      <div className="md:hidden bg-blue-900 text-white flex items-center justify-between p-3">
        <button onClick={()=>setOpen(!open)} className="text-xl">☰</button>
        <span className="font-bold">Digital Munshi</span><span></span>
      </div>
      <aside className={(open?"block":"hidden")+" md:flex md:w-60 w-full bg-blue-900 text-white p-4 flex-col md:h-screen md:overflow-y-auto md:shrink-0"}>
        <div className="hidden md:flex items-center gap-2.5 mb-1 px-1">
          {me && me.logo
            ? <div className="rounded-xl bg-white flex items-center justify-center overflow-hidden" style={{width:38,height:38}}><img src={me.logo} style={{width:"100%",height:"100%",objectFit:"contain"}} /></div>
            : <div className="rounded-xl bg-white/15 flex items-center justify-center" style={{width:36,height:36,fontSize:18}}>📒</div>}
          <div><div className="font-extrabold text-base leading-tight">Digital Munshi</div>
            <div className="text-xs text-indigo-300 leading-tight">{sub?sub.organization_name:"ERP"}</div></div>
        </div>
        <div className="mt-4 mb-1 hidden md:block"><FirmSwitcher /></div>
        <div className="mt-2 mb-1 px-2 text-[10px] uppercase tracking-wider text-indigo-300 hidden md:block">Menu</div>
        {nav.map(([k,l])=><button key={k} onClick={()=>go(k)} className={"flex items-center gap-3 text-left mb-1 "+(tab===k?"bg-blue-700":"")+(k==="plan"?" mt-2":"")}><Icon n={k} size={17}/><span>{l}</span></button>)}
        <button onClick={()=>{clearAuth();setAuthed(false);setSub(null);}} className="md:mt-auto flex items-center gap-3 text-left text-indigo-300"><Icon n="logout" size={17}/><span>Logout</span></button>
      </aside>
      <main className="flex-1 md:h-screen overflow-y-auto">
        <TopBar me={me} sub={sub} onNav={go} theme={theme} toggleTheme={toggleTheme} onLogout={logout} onSearch={(q)=>{setGsearch(q); go("vouchers");}} />
        <Banner sub={sub} onUpgrade={()=>setTab("plan")} />
        {expired && tab!=="plan" && tab!=="settings"
          ? <Subscribe sub={sub} onActivated={onActivated} />
          : <>
            {tab==="dash" && <Dashboard onNav={go}/>}
            {tab==="sale" && <NewSale key={saleMode} initialDoc={saleMode}/>}
            {tab==="items" && <ItemView />}
            {tab==="cashbank" && <CashBankView />}
            {tab==="pos" && <POSView />}
            {tab==="accounting" && <AccountingView />}
            {tab==="utils" && <UtilitiesView />}
            {tab==="parties" && <PartyView />}
            {tab==="vouchers" && <VouchersView key={"v"+gsearch} initialQuery={gsearch} onNav={go} />}
            {tab==="reports" && <ReportsView/>}
            {tab==="whatsapp" && <WhatsAppView/>}
            {tab==="hr" && <HRView/>}
            {tab==="staff" && <StaffView/>}
            {tab==="settings" && <Settings onSaved={()=>{}} />}
            {tab==="admin" && <AdminPanel/>}
            {tab==="plan" && <Subscribe sub={sub} onActivated={onActivated} />}
          </>}
      </main>
    </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
{% endverbatim %}
</script>
