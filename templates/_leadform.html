<div id="leadbox" style="scroll-margin-top:80px" class="max-w-md mx-auto bg-white rounded-2xl border border-orange-100 shadow-sm p-6">
  <div class="font-extrabold text-lg text-slate-800">Book a Free Demo</div>
  <div class="text-sm text-slate-500 mb-3">Leave your name and number — we'll call and help you set up.</div>
  <form id="leadForm" onsubmit="return submitLead(event)">
    <input name="name" required placeholder="Your name *" class="w-full p-3 mb-2 border border-slate-200 rounded-xl text-sm">
    <input name="phone" required type="tel" placeholder="Mobile number *" class="w-full p-3 mb-2 border border-slate-200 rounded-xl text-sm">
    <input name="business" placeholder="Business / shop name" class="w-full p-3 mb-2 border border-slate-200 rounded-xl text-sm">
    <button type="submit" class="w-full text-white py-3 rounded-xl font-bold" style="background:linear-gradient(135deg,#ea6a1e,#c2410c)">Get a Free Demo →</button>
    <div id="leadMsg" class="text-sm mt-2 text-center"></div>
  </form>
</div>
<script>
function submitLead(e){
  e.preventDefault();
  var f=e.target, msg=document.getElementById("leadMsg");
  var data=new FormData(f); data.append("source", location.pathname);
  msg.textContent="Sending…"; msg.style.color="#64748b";
  fetch("/api/lead/",{method:"POST",body:data})
    .then(function(r){return r.json();})
    .then(function(d){ if(d.ok){ msg.textContent="✓ "+d.message; msg.style.color="#059669"; f.reset(); }
      else { msg.textContent=d.error||"Something went wrong"; msg.style.color="#dc2626"; } })
    .catch(function(){ msg.textContent="Network error — please try again"; msg.style.color="#dc2626"; });
  return false;
}
</script>
