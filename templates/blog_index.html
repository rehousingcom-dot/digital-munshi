<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog — GST, Billing & Business Tips | Digital Munshi</title>
<meta name="description" content="GST, billing, inventory aur business tips — Indian dukaandaron ke liye aasan bhasha me. Digital Munshi blog.">
<link rel="canonical" href="https://erp.reloaddigital.in/blog/">
<meta name="robots" content="index, follow">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-slate-800 bg-white">
<header class="border-b sticky top-0 bg-white/90 backdrop-blur z-20">
  <div class="max-w-5xl mx-auto px-5 py-3 flex items-center justify-between">
    <a href="/welcome/" class="flex items-center gap-2"><div class="w-9 h-9 rounded-lg flex items-center justify-center text-white font-extrabold" style="background:linear-gradient(135deg,#ea6a1e,#c2410c)">DM</div><span class="font-extrabold text-lg">Digital Munshi</span></a>
    <a href="/" class="text-white px-4 py-2 rounded-xl text-sm font-bold" style="background:linear-gradient(135deg,#ea6a1e,#c2410c)">Free Trial</a>
  </div>
</header>
<section class="max-w-3xl mx-auto px-5 py-12">
  <h1 class="text-3xl font-extrabold mb-2">Blog</h1>
  <link rel="alternate" hreflang="{% if lang == 'hi' %}en{% else %}hi-IN{% endif %}" href="https://erp.reloaddigital.in{{ alt }}">
<p class="text-slate-500 mb-8">{{ L.blogsub }}</p>
  <div class="space-y-4">
    {% for slug, title, desc in posts %}
    <a href="{{ pre }}/blog/{{ slug }}/" class="block bg-white border border-slate-100 rounded-2xl p-5 hover:border-orange-200">
      <div class="font-bold text-lg text-slate-800">{{ title }}</div>
      <div class="text-sm text-slate-500 mt-1">{{ desc }}</div>
      <div class="text-orange-600 text-sm font-semibold mt-2">{{ L.read }}</div>
    </a>
    {% endfor %}
  </div>
</section>
<footer class="border-t py-8 text-center text-sm text-slate-400">© 2026 Reload Digital India · <a href="/welcome/" class="text-orange-600">Home</a></footer>
</body>
</html>
