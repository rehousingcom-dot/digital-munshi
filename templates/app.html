// ---------- auth + fetch helper ----------
function getToken(){ return localStorage.getItem("dm_token"); }
function setToken(t){ if(t) localStorage.setItem("dm_token", t); else localStorage.removeItem("dm_token"); }
function getRefresh(){ return localStorage.getItem("dm_refresh"); }
function setRefresh(t){ if(t) localStorage.setItem("dm_refresh", t); else localStorage.removeItem("dm_refresh"); }
function saveTokens(d){ if(!d) return; if(d.access) setToken(d.access); if(d.refresh) setRefresh(d.refresh); }
function clearAuth(){ setToken(null); setRefresh(null); }

// 401 aane par pehle refresh token se naya access lene ki koshish — tabhi logout.
async function tryRefresh(){
  const r = getRefresh();
  if(!r) return false;
  try{
    const res = await fetch(API+"/auth/token/refresh/", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({refresh:r})});
    if(!res.ok) return false;
    const d = await res.json();
    if(d.access){ setToken(d.access); if(d.refresh) setRefresh(d.refresh); return true; }
  }catch(e){}
  return false;
}

async function api(path, opts={}, _retried){
  const headers = {"Content-Type":"application/json", ...(opts.headers||{})};
  const t = getToken();
  if(t) headers["Authorization"] = "Bearer "+t;
  const res = await fetch(API+path, {...opts, headers});
  if(res.status===401){
    if(!_retried && await tryRefresh()) return api(path, opts, true);
    clearAuth(); location.reload(); return;
  }
  const ct = res.headers.get("content-type")||"";
  const data = ct.includes("json") ? await res.json() : await res.text();
  if(!res.ok) throw data;
  return data;
}

function Subscribe({sub,onActivated}){
  const [plans,setPlans]=useState([]),[cycle,setCycle]=useState("MONTHLY"),[busy,setBusy]=useState(""),[err,setErr]=useState("");
  useEffect(()=>{ api("/plans/").then(setPlans).catch(console.error); },[]);
  const pay=async(plan)=>{ setErr(""); setBusy(plan.code);
    try{
      const o=await api("/subscription/create_order/",{method:"POST",body:JSON.stringify({plan_code:plan.code,cycle})});
      if(o.dev_mode){ // bina real gateway ke activate (local testing)
        const v=await api("/subscription/verify/",{method:"POST",body:JSON.stringify({razorpay_order_id:o.order_id})});
        onActivated(v.subscription); setBusy(""); return;
      }
      // REDIRECT mode — popup/handler ki jagah server callback (blank-tab issue fix).
      const rzp=new Razorpay({ key:o.key_id, amount:o.amount, currency:o.currency, order_id:o.order_id,
        name:"Digital Munshi ERP", description:`${o.plan} (${cycle})`,
        redirect:true,
        callback_url: window.location.origin + "/api/subscription/callback/",
        modal:{ ondismiss:()=>{ setBusy(""); } },
        theme:{color:"#1F4E79"} });
      rzp.on("payment.failed",function(r){ setErr("Payment failed: "+((r&&r.error&&r.error.description)||"unknown")); });
      rzp.open(); setBusy("");
    }catch(e){ setErr(JSON.stringify(e)); setBusy(""); } };
  const expired = sub && !sub.access_allowed;
  return (
    <div className="p-6">
      <h2 className="text-xl font-bold text-slate-700 mb-1">Subscription Plans</h2>

      </div>
      <div className="grid md:grid-cols-3 gap-4">
        {plans.map(p=>{ const price=cycle==="YEARLY"?p.price_yearly:p.price_monthly; const pop=p.code==="pro";
          return (
          <div key={p.id} className={"card p-5 "+(pop?"ring-2 ring-blue-700":"")}>
            {pop && <div className="text-xs bg-blue-700 text-white inline-block px-2 py-0.5 rounded mb-2">Popular</div>}
            <div className="text-lg font-bold text-slate-700">{p.name}</div>
            <div className="text-3xl font-bold text-blue-900 my-2">{money(price)}<span className="text-sm font-normal text-slate-400">/{cycle==="YEARLY"?"yr":"mo"}</span></div>
            <ul className="text-sm text-slate-600 space-y-1 mb-4">
              <li>👥 {p.max_users===0?"Unlimited":p.max_users} users</li>
              {(p.features||[]).map((f,i)=><li key={i}>✓ {f}</li>)}
            </ul>
            <button disabled={busy===p.code} onClick={()=>pay(p)} className="bg-blue-900 text-white w-full py-2 rounded font-semibold disabled:opacity-50">{busy===p.code?"…":"Choose Plan"}</button>
          </div>);})}
      </div>
    </div>);
}

function PartyForm({party,onClose,onSaved}){
  const blank={name:"",legal_name:"",party_type:"CUSTOMER",gstin:"",pan:"",phone:"",email:"",
    address:"",city:"",state:"",state_code:"",pincode:"",opening_balance:0,opening_balance_type:"DR",credit_limit:0,credit_days:0,group:"",custom_fields:{}};
  const [f,setF]=useState(party?{...blank,...party}:blank);
  const [dup,setDup]=useState(null),[gst,setGst]=useState(null),[busy,setBusy]=useState(false),[err,setErr]=useState("");
  const [docs,setDocs]=useState((party&&party.documents)||[]),[docTitle,setDocTitle]=useState(""),[docFile,setDocFile]=useState(null);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const checkDup=async()=>{ if(!f.name)return; try{const r=await api(`/parties/check_duplicate/?name=${encodeURIComponent(f.name)}&gstin=${encodeURIComponent(f.gstin||"")}`);
    setDup((r.name_exists&&(!party||r.name_matches.every(m=>m.id!==party.id)))?r:null);}catch(e){} };
  const verify=async()=>{ if(!f.gstin)return; setGst({loading:true});
    try{const r=await api(`/parties/verify_gstin/?gstin=${encodeURIComponent(f.gstin)}`);
      setGst(r);
      if(r.valid){ setF(s=>({...s,state:r.state||s.state,state_code:r.state_code||s.state_code,
        legal_name:r.legal_name||s.legal_name,pan:r.pan||s.pan,
        address:r.address||s.address,city:r.city||s.city,pincode:r.pincode||s.pincode,
        name:s.name||r.trade_name||r.legal_name||""})); }
    }catch(e){ setGst({valid:false,detail:"Could not verify"}); } };
  const save=async()=>{ if(!f.name){setErr("Party name is required");return;} setBusy(true);setErr("");
    try{ const method=party?"PATCH":"POST"; const path=party?`/parties/${party.id}/`:"/parties/";
      const saved=await api(path,{method,body:JSON.stringify(f)});
      if(docFile){ const fd=new FormData(); fd.append("party",saved.id); fd.append("title",docTitle||docFile.name); fd.append("file",docFile);
        await fetch(API+"/party-documents/",{method:"POST",headers:{Authorization:"Bearer "+getToken()},body:fd}); }
      onSaved();
    }catch(e){ setErr(typeof e==="object"?Object.entries(e).map(([k,v])=>`${k}: ${v}`).join(", "):"Could not save"); setBusy(false); } };
  const I=(label,k,props={})=>(<div><label className="text-xs font-semibold text-slate-500">{label}</label>
    <input className="border border-slate-200 w-full p-2 rounded-lg text-sm mt-1" value={f[k]||""} onChange={e=>set(k,e.target.value)} {...props}/></div>);
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto" style={{background:"rgba(15,23,42,.45)"}} onClick={onClose}>
      <div className="card my-8 w-full max-w-3xl p-0 overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>

          <button onClick={onClose} className="text-white text-xl">×</button></div>
        <div className="p-6 space-y-4">
          {err && <div className="bg-red-50 text-red-700 text-sm p-2.5 rounded-lg">{err}</div>}
          <div className="grid md:grid-cols-3 gap-3">
            <div>{I(t("Party Name *","पार्टी नाम *"),"name",{onBlur:checkDup})}
              {dup && <div className="text-xs text-amber-700 mt-1">⚠ "{dup.name_matches[0].name}" already exists{dup.name_matches[0].city?` (${dup.name_matches[0].city})`:""} — naam badal sakte hain</div>}</div>
            <div><label className="text-xs font-semibold text-slate-500">{t("Party Type","पार्टी प्रकार")}</label>
              <select className="border border-slate-200 w-full p-2 rounded-lg text-sm mt-1" value={f.party_type} onChange={e=>set("party_type",e.target.value)}>
                <option value="CUSTOMER">{t("Customer (Debtor — To Receive)","ग्राहक (देनदार — लेना है)")}</option><option value="SUPPLIER">{t("Supplier (Creditor — To Pay)","सप्लायर (लेनदार — देना है)")}</option><option value="BOTH">{t("Both","दोनों")}</option></select></div>

          </div>

          <div className="grid md:grid-cols-3 gap-3">{I(t("Party Group (Dealers / VIP / Route)","पार्टी ग्रुप (डीलर / VIP / रूट)"),"group")}</div>
          <div className="border-t pt-4">
            <label className="text-xs font-semibold text-slate-500">✚ Custom Fields (extra info — e.g. Route, Vehicle No, Tag)</label>

              <input className="border border-slate-200 p-1.5 rounded-lg text-sm flex-1" value={k} readOnly/>

          </div>
          <div className="border-t pt-4">
            <label className="text-xs font-semibold text-slate-500">📎 Party Document (Aadhaar / PAN / GST cert / agreement)</label>

            <div className="flex gap-2 mt-1">
              <input className="border border-slate-200 p-2 rounded-lg text-sm flex-1" placeholder={t("Document title","डॉक्यूमेंट शीर्षक")} value={docTitle} onChange={e=>setDocTitle(e.target.value)}/>
              <input type="file" className="text-sm" onChange={e=>setDocFile(e.target.files[0])}/></div>
            <div className="text-xs text-slate-400 mt-1">Save karte waqt document bhi upload ho jayega.</div>
          </div>
        </div>
        <div className="flex justify-end gap-2 px-6 py-4 bg-slate-50 border-t">
          <button onClick={onClose} className="px-4 py-2 rounded-lg text-sm font-semibold text-slate-600">{t("Cancel","रद्द करें")}</button>
          <button onClick={save} disabled={busy} className="px-5 py-2 rounded-lg text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)",opacity:busy?.6:1}}>{busy?t("Saving…","सेव हो रहा…"):party?t("Update","अपडेट"):t("Save Party","पार्टी सेव करें")}</button>
        </div>
      </div>
    </div>);
}

function ItemView(){

          <div className="relative"><span className="absolute left-3 top-2.5 text-slate-400 text-sm">🔍</span>
            <input className="p-2.5 pl-9 text-sm rounded-xl border border-slate-200" style={{minWidth:220}} placeholder={t("Search item…","आइटम खोजें…")} value={q} onChange={e=>setQ(e.target.value)} /></div>
          <button onClick={()=>{setEdit(null);setOpen(true);}} className="text-white px-4 py-2.5 rounded-xl text-sm font-bold" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>{t("+ Add Item","+ आइटम जोड़ें")}</button>
        </div>
      </div>
      <div className="card overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-100 text-slate-600"><tr>
            <th className="text-left p-2.5">{t("Name","नाम")}</th><th className="text-left p-2.5">{t("Type","प्रकार")}</th><th className="text-left p-2.5">{t("Item Code","आइटम कोड")}</th>
            <th className="text-left p-2.5">{t("HSN","HSN")}</th><th className="text-right p-2.5">{t("MRP","MRP")}</th><th className="text-center p-2.5">{t("Variants","वेरिएंट")}</th><th></th></tr></thead>
          <tbody>
            {filt.length===0 && <tr><td className="p-3 text-slate-400" colSpan={7}>{t('No items — start with "+ Add Item"','कोई आइटम नहीं — "+ आइटम जोड़ें" से शुरू करें')}</td></tr>}
            {filt.map(r=><tr key={r.id} className="border-b hover:bg-slate-50">
              <td className="p-2.5 font-semibold text-slate-700">{r.name}</td>
              <td className="p-2.5"><span className="text-xs px-2 py-0.5 rounded-full" style={{background:r.item_type==="SERVICE"?"#ede9fe":"#dcfce7",color:r.item_type==="SERVICE"?"#6d28d9":"#166534"}}>{r.item_type==="SERVICE"?t("Service","सेवा"):t("Product","उत्पाद")}</span></td>
              <td className="p-2.5 text-xs">{(r.variants&&r.variants[0]&&r.variants[0].item_code)||"—"}</td>
              <td className="p-2.5 text-xs">{r.hsn_code||"—"}</td><td className="p-2.5 text-right">{money(r.mrp)}</td>
              <td className="p-2.5 text-center">{(r.variants||[]).length}</td>
              <td className="p-2.5 text-right"><button onClick={()=>{setEdit(r);setOpen(true);}} className="text-xs font-semibold text-blue-700 hover:underline">{t("Edit","एडिट")}</button></td>
            </tr>)}
          </tbody>
        </table>
      </div>
      {open && <ItemForm item={edit} onClose={()=>setOpen(false)} onSaved={()=>{setOpen(false);load();}}/>}
    </div>);
}

function ItemForm({item,onClose,onSaved}){
  const [units,setUnits]=useState([]),[taxes,setTaxes]=useState([]),[cats,setCats]=useState([]),[godowns,setGodowns]=useState([]);
  const v0=item&&item.variants&&item.variants[0];
  const blank={name:"",item_type:"GOODS",hsn_code:"",category:"",primary_unit:"",secondary_unit:"",conversion_factor:1,
    mrp:0,tax_rate:"",reorder_level:0,size:"",colour:"",model:"",
    sale_price:0,purchase_price:0,sec_sale_price:0,
    batch_no:"",batch_mrp:0,batch_disc_type:"PERCENT",batch_disc_value:0,batch_expiry:"",batch_mfg:"",batch_size:"",batch_colour:"",batch_model:"",
    opening_godown:"",opening_qty:0,is_combo:false,components:[],more_batches:[]};
  const [f,setF]=useState(item?{...blank,name:item.name,item_type:item.item_type,hsn_code:item.hsn_code||"",category:item.category||"",
    primary_unit:item.primary_unit||"",secondary_unit:item.secondary_unit||"",conversion_factor:item.conversion_factor||1,
    mrp:item.mrp||0,tax_rate:item.tax_rate||"",reorder_level:item.reorder_level||0,is_combo:!!item.is_combo,components:[],
    size:v0&&v0.size||"",colour:v0&&v0.colour||"",model:v0&&v0.model||""}:blank);
  const [allVariants,setAllVariants]=useState([]);
  const [tab,setTab]=useState("pricing"),[busy,setBusy]=useState(false),[err,setErr]=useState(""),[newUnit,setNewUnit]=useState("");
  const [imgFile,setImgFile]=useState(null);
  const set=(k,val)=>setF(s=>({...s,[k]:val}));
  useEffect(()=>{ apiList("/units/").then(u=>{setUnits(u); if(!item&&u[0])setF(s=>({...s,primary_unit:u[0].id}));});
    apiList("/tax-rates/").then(setTaxes); apiList("/categories/").then(setCats);
    apiList("/godowns/").then(g=>{setGodowns(g); if(g[0])setF(s=>({...s,opening_godown:g[0].id}));});
    apiList("/items/?page_size=500").then(its=>{const vs=[];its.forEach(it=>(it.variants||[]).forEach(v=>vs.push({id:v.id,label:it.name+(v.size||v.colour||v.model?` (${[v.size,v.colour,v.model].filter(Boolean).join(" ")})`:"")})));setAllVariants(vs);}); },[]);
  const addUnit=async()=>{ const n=newUnit.trim(); if(!n)return;
    try{ const u=await api("/units/",{method:"POST",body:JSON.stringify({name:n,short_code:n.slice(0,6).toUpperCase()})});
      setUnits(us=>[...us,u]); set("primary_unit",u.id); setNewUnit(""); }catch(e){ setErr("Could not add unit (maybe duplicate)"); } };
  const save=async()=>{ if(!f.name){setErr("Item name is required");return;} if(!f.primary_unit){setErr("Select a primary unit");return;}
    setBusy(true); setErr("");
    try{
      const body={name:f.name,item_type:f.item_type,hsn_code:f.hsn_code,mrp:String(f.mrp||0),reorder_level:String(f.reorder_level||0),
        is_combo:!!f.is_combo, primary_unit:+f.primary_unit, conversion_factor:String(f.conversion_factor||1)};
      if(f.category) body.category=+f.category;
      if(f.secondary_unit) body.secondary_unit=+f.secondary_unit;
      if(f.tax_rate) body.tax_rate=+f.tax_rate;
      const it=item?await api(`/items/${item.id}/`,{method:"PATCH",body:JSON.stringify(body)})
                    :await api("/items/",{method:"POST",body:JSON.stringify(body)});
      if(imgFile){ const ifd=new FormData(); ifd.append("image",imgFile); await fetch(API+`/items/${it.id}/upload_image/`,{method:"POST",headers:{Authorization:"Bearer "+getToken()},body:ifd}).catch(()=>{}); }
      // fetch variant id
      const full=await api(`/items/${it.id}/`);
      const variant=full.variants&&full.variants[0];
      if(f.is_combo){ for(const c of (f.components||[])){ if(c.component&&c.quantity) await api("/item-components/",{method:"POST",body:JSON.stringify({parent:it.id,component:+c.component,quantity:String(c.quantity)})}).catch(()=>{}); } }
      if(variant){
        if(f.size||f.colour||f.model) await api(`/variants/${variant.id}/`,{method:"PATCH",body:JSON.stringify({size:f.size,colour:f.colour,model:f.model})}).catch(()=>{});
        // per-unit prices
        if(+f.sale_price||+f.purchase_price) await api("/unit-prices/",{method:"POST",body:JSON.stringify({variant:variant.id,unit:+f.primary_unit,sale_price:String(f.sale_price||0),purchase_price:String(f.purchase_price||0)})}).catch(()=>{});
        if(f.secondary_unit&&+f.sec_sale_price) await api("/unit-prices/",{method:"POST",body:JSON.stringify({variant:variant.id,unit:+f.secondary_unit,sale_price:String(f.sec_sale_price),purchase_price:"0"})}).catch(()=>{});
        // batch
        let batchId=null;
        if(f.batch_no){ const b=await api("/batches/",{method:"POST",body:JSON.stringify({variant:variant.id,batch_no:f.batch_no,mrp:String(f.batch_mrp||0),discount_type:f.batch_disc_type,discount_value:String(f.batch_disc_value||0),expiry_date:f.batch_expiry||null,mfg_date:f.batch_mfg||null,size:f.batch_size||"",colour:f.batch_colour||"",model:f.batch_model||""})}).catch(()=>null); if(b)batchId=b.id; }
        for(const mb of (f.more_batches||[])){ if(mb.batch_no) await api("/batches/",{method:"POST",body:JSON.stringify({variant:variant.id,batch_no:mb.batch_no,mrp:String(mb.mrp||0),expiry_date:mb.expiry||null})}).catch(()=>{}); }
        // opening stock
        if(+f.opening_qty&&f.opening_godown) await api("/stock/",{method:"POST",body:JSON.stringify({variant:variant.id,godown:+f.opening_godown,batch:batchId,quantity:String(f.opening_qty)})}).catch(()=>{});
      }
      onSaved();
    }catch(e){ setErr(typeof e==="object"?Object.entries(e).map(([k,val])=>`${k}: ${val}`).join(", "):"Save fail"); setBusy(false); } };
  const cell="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1";
  const I=(label,k,props={})=>(<div><label className="text-xs font-semibold text-slate-500">{label}</label><input className={cell} value={f[k]} onChange={e=>set(k,e.target.value)} {...props}/></div>);
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto" style={{background:"rgba(15,23,42,.45)"}} onClick={onClose}>
      <div className="card my-8 w-full max-w-3xl p-0 overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>
          <div className="flex items-center gap-3"><h3 className="text-white font-bold text-lg">{item?t("Edit Item","आइटम एडिट करें"):t("Add Item","आइटम जोड़ें")}</h3>
            <div className="flex rounded-lg overflow-hidden text-xs">
              {[["GOODS",t("Product","उत्पाद")],["SERVICE",t("Service","सेवा")]].map(([v,l])=><button key={v} onClick={()=>set("item_type",v)} className="px-3 py-1 font-semibold" style={{background:f.item_type===v?"#fff":"rgba(255,255,255,.2)",color:f.item_type===v?"#c2410c":"#fff"}}>{l}</button>)}</div></div>
          <button onClick={onClose} className="text-white text-xl">×</button></div>
        <div className="p-6 space-y-4">
          {err && <div className="bg-red-50 text-red-700 text-sm p-2.5 rounded-lg">{err}</div>}
          <div className="grid md:grid-cols-3 gap-3">
            {I(t("Item Name *","आइटम नाम *"),"name")}{I(t("HSN / SAC","HSN / SAC"),"hsn_code")}
            <div><label className="text-xs font-semibold text-slate-500">{t("Category","श्रेणी")}</label>
              <select className={cell} value={f.category} onChange={e=>set("category",e.target.value)}><option value="">— none —</option>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          </div>
          <div className="flex items-center gap-3">
            {(imgFile||(item&&item.image)) && <img src={imgFile?URL.createObjectURL(imgFile):item.image} alt="" className="rounded-lg border border-slate-200 object-cover" style={{width:56,height:56}}/>}
            <label className="text-xs font-semibold text-orange-600 cursor-pointer bg-orange-50 border border-orange-100 px-3 py-2 rounded-lg">📷 {imgFile?imgFile.name:(item&&item.image?"Change item photo":"Upload item photo")}
              <input type="file" accept="image/*" className="hidden" onChange={e=>setImgFile(e.target.files[0]||null)} /></label>
          </div>
          <div className="border-t pt-3">
            <div className="text-xs font-bold text-slate-500 mb-2">UNITS (primary + secondary alag — slide 5)</div>
            <div className="grid md:grid-cols-3 gap-3 items-end">
              <div><label className="text-xs font-semibold text-slate-500">{t("Primary Unit *","प्राइमरी यूनिट *")}</label>
                <select className={cell} value={f.primary_unit} onChange={e=>set("primary_unit",e.target.value)}><option value="">—</option>{units.map(u=><option key={u.id} value={u.id}>{u.name} ({u.short_code})</option>)}</select></div>
              <div><label className="text-xs font-semibold text-slate-500">{t("Secondary Unit","सेकंडरी यूनिट")}</label>
                <select className={cell} value={f.secondary_unit} onChange={e=>set("secondary_unit",e.target.value)}><option value="">— none —</option>{units.map(u=><option key={u.id} value={u.id}>{u.name} ({u.short_code})</option>)}</select></div>
              <div><label className="text-xs font-semibold text-slate-500">{t("1 Secondary = ? Primary","1 सेकंडरी = ? प्राइमरी")}</label>
                <input type="number" className={cell} value={f.conversion_factor} onChange={e=>set("conversion_factor",e.target.value)}/></div>
            </div>
            <div className="flex gap-2 mt-2"><input className="border border-slate-200 p-1.5 rounded-lg text-xs flex-1" placeholder="New unit name (e.g. Box)" value={newUnit} onChange={e=>setNewUnit(e.target.value)}/>

            </div>
            {tab==="pricing" && <div className="space-y-3">
              <div className="grid md:grid-cols-4 gap-3">
                {I(t("MRP","MRP"),"mrp",{type:"number"})}{I(t("Sale Price (primary)","बिक्री भाव (प्राइमरी)"),"sale_price",{type:"number"})}{I(t("Purchase Price","खरीद भाव"),"purchase_price",{type:"number"})}

              <div className="text-xs text-slate-400">Har unit-size ka alag sale price (slide 5 point 3). Secondary price na do to conversion se calc hoga.</div>
            </div>}
            {tab==="stock" && <div className="space-y-3">
              <div className="text-xs font-bold text-slate-500">MRP-wise Batch Discount (slide 5 point 2)</div>
              <div className="grid md:grid-cols-4 gap-3">
                {I(t("Batch No.","बैच नं."),"batch_no")}{I(t("Batch MRP","बैच MRP"),"batch_mrp",{type:"number"})}
                <div><label className="text-xs font-semibold text-slate-500">{t("Disc Type","छूट प्रकार")}</label>
                  <select className={cell} value={f.batch_disc_type} onChange={e=>set("batch_disc_type",e.target.value)}><option value="PERCENT">Percent</option><option value="AMOUNT">Amount</option></select></div>
                {I(t("Disc Value","छूट मान"),"batch_disc_value",{type:"number"})}

// ---------- Camera barcode scanner (Chrome BarcodeDetector) ----------
function CameraScan({onDetect,onClose}){
  const vref=useRef(); const [err,setErr]=useState("");
  useEffect(()=>{
    let stream=null, raf=null, stop=false;
    const cleanup=()=>{ stop=true; if(raf)cancelAnimationFrame(raf); if(stream)stream.getTracks().forEach(t=>t.stop()); };
    (async()=>{
      if(!("BarcodeDetector" in window)){ setErr(t("Is browser me camera-scan support nahi — barcode type karo (Chrome/Android best).","इस ब्राउज़र में कैमरा-स्कैन नहीं — बारकोड टाइप करें")); return; }
      try{
        const det=new window.BarcodeDetector({formats:["ean_13","ean_8","code_128","upc_a","upc_e","code_39","qr_code","itf"]});
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
        if(vref.current){ vref.current.srcObject=stream; await vref.current.play(); }
        const tick=async()=>{ if(stop)return;
          try{ const codes=await det.detect(vref.current); if(codes&&codes[0]&&codes[0].rawValue){ cleanup(); onDetect(codes[0].rawValue); return; } }catch(e){}
          raf=requestAnimationFrame(tick); };
        tick();
      }catch(e){ setErr(t("Camera nahi mila — permission do ya barcode type karo.","कैमरा नहीं मिला — अनुमति दें या बारकोड टाइप करें")); }
    })();
    return cleanup;
  },[]);
  return (<div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(0,0,0,.75)"}} onClick={onClose}>
    <div className="card p-4 w-full max-w-md" onClick={e=>e.stopPropagation()}>
      <div className="flex justify-between items-center mb-2"><div className="font-bold text-slate-700">{t("Scan barcode","बारकोड स्कैन करें")}</div><button onClick={onClose} className="text-slate-400 text-2xl leading-none">×</button></div>
      {err ? <div className="text-sm text-red-600 p-3">{err}</div> :
        <><video ref={vref} className="w-full rounded-xl bg-black" style={{maxHeight:340}} muted playsInline></video>
        <div className="text-xs text-slate-400 mt-2 text-center">{t("Barcode camera ke saamne rakho","बारकोड कैमरे के सामने रखें")}</div></>}
    </div></div>);
}

function NewSale({initialDoc}){

      setItems(x=>[...x,it]);

      if(vid){ setLines(ls=>{ const n=ls.filter(l=>l.variant); const b=blank(); b.variant=String(vid); b.unit=it.primary_unit||pu; b.rate=+qiRate||0; b.tax_percent=+(qiTax||0); n.push(b); n.push(blank()); return n; }); }
      setQiOpen(false); setQiName(""); setQiRate(""); setQiTax(""); setErr("");
    }catch(e){ setErr("Could not add item — create full item from Items page"); } };
  const applyPriceList=id=>{ setPlId(id); const pl=priceLists.find(x=>x.id==id); if(!pl)return;
    setLines(ls=>ls.map(l=>{ if(!l.variant)return l; const it=(pl.items||[]).find(x=>x.variant==l.variant); return it?{...l,rate:+it.price}:l; })); };
  const DOCS=[["SALE","Tax Invoice"],["PURCHASE","Purchase"],["ESTIMATE","Estimate / Quotation"],["PROFORMA","Proforma Invoice"],["SALE_ORDER","Sale Order"],["DELIVERY_CHALLAN","Delivery Challan"],["SALE_RETURN","Sale Return / Credit Note"]];
  function blank(){ return {variant:"",unit:"",qty:1,rate:0,incl:false,mrp:0,disc1_pct:0,disc2_pct:0,disc3_pct:0,discount_amount:0,tax_percent:0,cess_percent:0,free_qty:0,batch:"",description:""}; }
  useEffect(()=>{ apiList("/parties/?page_size=500").then(setParties); apiList("/godowns/").then(g=>{setGodowns(g);if(g[0])setGodown(g[0].id);});
    apiList("/units/").then(setUnits); apiList("/items/?page_size=500").then(setItems);
    apiList("/price-lists/").then(setPriceLists).catch(()=>{});
    api("/business-profile/").then(setProfile).catch(()=>{}); },[]);
  const unitsById={}; units.forEach(u=>unitsById[u.id]=u);

  const variants=[]; items.forEach(it=>(it.variants||[]).forEach(v=>variants.push({

    code:v.item_code, item:it, prices:v.unit_prices||[], batches:v.batches||[] })));

    if(v.item.secondary_unit&&v.item.secondary_unit!==v.item.primary_unit)out.push(v.item.secondary_unit); return out; };
  const priceFor=(v,unitId)=>{ const p=(v.prices||[]).find(x=>x.unit==unitId); if(p&&+p.sale_price)return +p.sale_price;
    return +v.item.mrp||0; };
  const taxFor=v=>{ const t=v&&v.item&&v.item.tax_percent; return (t===0||t)?+t:0; };
  const setLine=(i,k,val)=>{ setLines(ls=>{ const n=ls.map((l,j)=>j===i?{...l,[k]:val}:l);

// ---------- Utilities: Barcode & Label Designer + Import/Export ----------
function BarcodeDesigner(){
  const [items,setItems]=useState([]),[variants,setVariants]=useState([]);
  const [vid,setVid]=useState(""),[value,setValue]=useState(""),[name,setName]=useState(""),[price,setPrice]=useState("");
  const [sym,setSym]=useState("CODE128"),[w,setW]=useState(50),[h,setH]=useState(30),[copies,setCopies]=useState(24);
  const [cols,setCols]=useState(3),[uniq,setUniq]=useState(false),[showName,setShowName]=useState(true),[showPrice,setShowPrice]=useState(true);
  const [bid,setBid]=useState("");
  const svgRef=useRef(null);
  const barcodeSVG=(val)=>{ const el=document.createElementNS("http://www.w3.org/2000/svg","svg");
    try{ window.JsBarcode(el,val,{format:(sym==="EAN13"&&/^\d{12,13}$/.test(val))?"EAN13":"CODE128",width:2,height:48,fontSize:14,margin:6}); }catch(e){}
    return el.outerHTML; };
  useEffect(()=>{ apiList("/items/?page_size=500").then(its=>{ setItems(its);
    const vs=[]; its.forEach(it=>(it.variants||[]).forEach(v=>vs.push({id:v.id,label:it.name+(v.size||v.colour||v.model?` (${[v.size,v.colour,v.model].filter(Boolean).join(" ")})`:""),code:v.item_code,barcode:v.barcode,name:it.name,mrp:it.mrp,batches:v.batches||[]})));
    setVariants(vs); if(vs[0]){ setVid(String(vs[0].id)); setValue(vs[0].barcode||vs[0].code||""); setName(vs[0].name); setPrice(vs[0].mrp||""); } }); },[]);
  const onPick=id=>{ setVid(id); setBid(""); const v=variants.find(x=>x.id==id); if(v){ setValue(v.barcode||v.code||""); setName(v.name); setPrice(v.mrp||""); } };
  const batchesFor=()=>{ const v=variants.find(x=>x.id==vid); return (v&&v.batches)||[]; };
  const onPickBatch=id=>{ setBid(id); const v=variants.find(x=>x.id==vid); if(!v)return; const base=v.barcode||v.code||"";
    if(!id){ setValue(base); setPrice(v.mrp||""); return; }
    const b=(v.batches||[]).find(x=>x.id==id); if(b){ setValue(base+"-"+b.batch_no); if(+b.mrp)setPrice(b.mrp); } };
  useEffect(()=>{ if(svgRef.current && value && window.JsBarcode){ try{
    window.JsBarcode(svgRef.current,value,{format:sym==="EAN13"&&/^\d{12,13}$/.test(value)?"EAN13":"CODE128",width:2,height:48,fontSize:14,margin:6});
  }catch(e){ try{window.JsBarcode(svgRef.current,value||"000000",{format:"CODE128"});}catch(_){} } } },[value,sym]);
  const printSheet=()=>{ const win=window.open("","_blank"); const n=Math.max(1,+copies||1); const c=Math.max(1,+cols||1);
    let labels="";
    for(let i=0;i<n;i++){
      const val=uniq?`${value}-${String(i+1).padStart(4,"0")}`:value;
      const inner=barcodeSVG(val);
      labels+=`<div style="width:${w}mm;height:${h}mm;border:1px dashed #ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1mm;box-sizing:border-box;overflow:hidden">
        ${showName?`<div style="font:600 9pt sans-serif;text-align:center">${name||""}</div>`:""}${inner}
        ${showPrice?`<div style="font:700 10pt sans-serif;color:#059669">₹${price||""}</div>`:""}</div>`;
    }
    win.document.write(`<html><head><title>Labels</title></head>
      <body style="margin:0;padding:4mm"><div style="display:grid;grid-template-columns:repeat(${c},${w}mm);gap:1mm">${labels}</div>
      <script>window.onload=function(){window.print();}<\/script></body></html>`); win.document.close(); };
  return (
    <div className="grid md:grid-cols-2 gap-5">
      <div className="card p-5 space-y-3">
        <div className="font-bold text-slate-700">🏷️ Barcode & Label Designer</div>
        <div><label className="text-xs font-semibold text-slate-500">Product</label>
          <select className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={vid} onChange={e=>onPick(e.target.value)}>{variants.map(v=><option key={v.id} value={v.id}>{v.label}</option>)}</select></div>
        {batchesFor().length>0 && <div><label className="text-xs font-semibold text-slate-500">{t("Batch (batch-wise barcode)","बैच (बैच-वाइज़ बारकोड)")}</label>
          <select className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={bid} onChange={e=>onPickBatch(e.target.value)}><option value="">{t("— all / no batch —","— सभी / कोई बैच नहीं —")}</option>{batchesFor().map(b=><option key={b.id} value={b.id}>{b.batch_no}{b.mrp?` (MRP ${b.mrp})`:""}</option>)}</select></div>}
        <div><label className="text-xs font-semibold text-slate-500">Barcode value</label>
          <input className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={value} onChange={e=>setValue(e.target.value)}/></div>
        <div className="grid grid-cols-2 gap-3">
          <div><label className="text-xs font-semibold text-slate-500">Symbology</label>
            <select className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={sym} onChange={e=>setSym(e.target.value)}><option value="CODE128">CODE-128</option><option value="EAN13">EAN-13</option></select></div>
          <div><label className="text-xs font-semibold text-slate-500">Copies</label>
            <input type="number" className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={copies} onChange={e=>setCopies(e.target.value)}/></div>
          <div><label className="text-xs font-semibold text-slate-500">Label width (mm)</label>
            <input type="number" className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={w} onChange={e=>setW(e.target.value)}/></div>
          <div><label className="text-xs font-semibold text-slate-500">Label height (mm)</label>
            <input type="number" className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={h} onChange={e=>setH(e.target.value)}/></div>
          <div><label className="text-xs font-semibold text-slate-500">Columns / row (fix print)</label>
            <input type="number" min="1" className="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1" value={cols} onChange={e=>setCols(e.target.value)}/></div>
        </div>
        <div className="flex flex-wrap gap-4 text-xs font-semibold text-slate-600">
          <label className="flex items-center gap-1.5"><input type="checkbox" checked={uniq} onChange={e=>setUniq(e.target.checked)}/> Unique barcode per unit (serial)</label>
          <label className="flex items-center gap-1.5"><input type="checkbox" checked={showName} onChange={e=>setShowName(e.target.checked)}/> Name</label>
          <label className="flex items-center gap-1.5"><input type="checkbox" checked={showPrice} onChange={e=>setShowPrice(e.target.checked)}/> Price</label>
        </div>
        <div className="text-xs text-slate-400">🖨 Choose printer & paper size in the browser print dialog. Turn on "Unique per unit" to give each label a different barcode (…-0001, …-0002).</div>
        <button onClick={printSheet} className="text-white px-4 py-2.5 rounded-xl text-sm font-bold w-full" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>🖨 Print Labels</button>
      </div>
      <div className="card p-5">
        <div className="font-bold text-slate-700 mb-3">Preview</div>
        <div className="border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center p-6" style={{minHeight:200}}>
          <div className="font-bold text-slate-800">{name}</div>
          <svg ref={svgRef}></svg>
          <div className="text-lg font-extrabold" style={{color:"#059669"}}>₹{price}</div>
        </div>
        <div className="text-xs text-slate-400 mt-2">Label sheet: {w} × {h} mm · {copies} labels · {sym}</div>
      </div>
    </div>);
}

function UtilitiesView(){

        {[["barcode",t("Barcode & Labels","बारकोड व लेबल")],["pricelists",t("Price Lists","मूल्य सूची")],["data",t("Import / Export","इम्पोर्ट / एक्सपोर्ट")],["fy",t("Close Financial Year","वित्तीय वर्ष बंद")]].map(([k,l])=>

          <button onClick={()=>dl("/parties-export/","parties.csv")} className="bg-slate-100 px-4 py-2 rounded-lg text-sm font-semibold w-full">⬇ Export Parties CSV</button>
          <label className="block text-sm font-semibold text-slate-600">Import Parties CSV<input type="file" accept=".csv" className="block mt-1 text-sm" onChange={e=>e.target.files[0]&&up("/parties-import/",e.target.files[0])}/></label>
          <div className="text-xs text-slate-400">Columns: name, party_type, gstin, phone, email, city, state</div></div>
        <div className="card p-5 space-y-3"><div className="font-bold text-slate-700">Transactions / Backup</div>
          <button onClick={()=>dl("/transactions-export/","transactions.csv")} className="bg-slate-100 px-4 py-2 rounded-lg text-sm font-semibold w-full">⬇ Export All Transactions CSV</button>
          <button onClick={()=>dl("/transactions-export/?type=SALE","sales.csv")} className="bg-slate-100 px-4 py-2 rounded-lg text-sm font-semibold w-full">⬇ Export Sales Only</button>
          <button onClick={()=>dl("/transactions-export/?type=PURCHASE","purchases.csv")} className="bg-slate-100 px-4 py-2 rounded-lg text-sm font-semibold w-full">⬇ Export Purchases Only</button>
          <div className="text-xs text-slate-400">Full backup of invoices with GST breakup. Keep a copy safe.</div></div>
      </div>}
      {tab==="fy" && <div className="card p-6 max-w-xl">
        <div className="font-bold text-slate-700 mb-2">Close Financial Year</div>
        <p className="text-sm text-slate-500 mb-3">Naye financial year ke liye invoice numbering reset hoti hai aur opening balances carry-forward. Current data safe rehta hai — sirf reporting period badalta hai.</p>
        <div className="text-xs text-amber-700 bg-amber-50 p-3 rounded-lg">Production deploy ke baad yeh action backup ke saath enable hoga. Abhi data backup Settings se le sakte hain.</div>
      </div>}
    </div>);
}

// ---------- Cash & Bank (accounts, cheques, loans) ----------
function CashBankView(){
  const [tab,setTab]=useState("accounts"),[sum,setSum]=useState(null);
  const [accounts,setAccounts]=useState([]),[cheques,setCheques]=useState([]),[loans,setLoans]=useState([]),[parties,setParties]=useState([]);
  const [expenses,setExpenses]=useState([]),[expCats,setExpCats]=useState([]),[expSum,setExpSum]=useState(null);
  const [modal,setModal]=useState(null);
  const loadAll=()=>{ api("/cashbank-summary/").then(setSum).catch(()=>{}); apiList("/bank-accounts/").then(setAccounts);
    apiList("/cheques/").then(setCheques); apiList("/loans/").then(setLoans);
    apiList("/expenses/").then(setExpenses); apiList("/expense-categories/").then(setExpCats); api("/expense-summary/").then(setExpSum).catch(()=>{}); };
  useEffect(()=>{ loadAll(); apiList("/parties/?page_size=500").then(setParties); },[]);
  const Card=({label,val,color})=> <div className="card kpi-card p-4"><div className="text-xs font-semibold text-slate-500">{label}</div><div className="text-2xl font-extrabold mt-1" style={{color}}>{money(val)}</div></div>;
  const pName=id=>{const p=parties.find(x=>x.id==id);return p?p.name:"—";};
  return (
    <div className="p-6 fade-in">
      <h2 className="text-2xl font-extrabold text-slate-800 mb-4">{t("Cash & Bank","कैश व बैंक")}</h2>
      {sum && <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
        <Card label="Cash in Hand" val={sum.cash_in_hand} color="#059669"/>
        <Card label="Bank Balance" val={sum.bank_balance} color="#1e3a8a"/>
        <Card label="Cheques In" val={sum.cheques_receivable} color="#ea6a1e"/>
        <Card label="Cheques Out" val={sum.cheques_payable} color="#dc2626"/>
        <Card label="Loan Outstanding" val={sum.loan_outstanding} color="#7c3aed"/>
      </div>}
      <div className="flex gap-2 flex-wrap mb-4">
        {[["accounts",t("Bank & Cash","बैंक व कैश")],["expenses",t("Expenses","खर्चे")],["cheques",t("Cheques","चेक")],["loans",t("Loan Accounts","लोन खाते")]].map(([k,l])=>
          <button key={k} onClick={()=>setTab(k)} className="px-3.5 py-1.5 rounded-full text-sm font-semibold" style={{background:tab===k?"#ea6a1e":"#fff",color:tab===k?"#fff":"#64748b",border:"1px solid "+(tab===k?"#ea6a1e":"#e2e8f0")}}>{l}</button>)}
        <button onClick={()=>setModal({type:tab})} className="ml-auto text-white px-4 py-1.5 rounded-full text-sm font-bold" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>+ Add</button>
      </div>
      {tab==="accounts" && <div className="card overflow-hidden"><table className="w-full text-sm">
        <thead className="bg-slate-100 text-slate-600"><tr><th className="text-left p-2.5">{t("Name","नाम")}</th><th className="text-left p-2.5">{t("Type","प्रकार")}</th><th className="text-left p-2.5">A/c No</th><th className="text-left p-2.5">Bank/UPI</th><th className="text-right p-2.5">Balance</th><th className="text-right p-2.5">Action</th></tr></thead>
        <tbody>{accounts.length===0&&<tr><td className="p-3 text-slate-400" colSpan={6}>No accounts</td></tr>}
          {accounts.map(a=><tr key={a.id} className="border-b hover:bg-slate-50"><td className="p-2.5 font-semibold">{a.name}</td>
            <td className="p-2.5"><span className="text-xs px-2 py-0.5 rounded-full" style={{background:a.account_type==="CASH"?"#dcfce7":"#dbeafe",color:a.account_type==="CASH"?"#166534":"#1e40af"}}>{a.account_type}</span></td>
            <td className="p-2.5 text-xs">{a.account_no||"—"}</td><td className="p-2.5 text-xs">{a.bank_name||a.upi_id||"—"}</td>
            <td className="p-2.5 text-right font-bold" style={{color:"#059669"}}>{money(a.balance)}</td>
            <td className="p-2.5 text-right"><button onClick={()=>setModal({type:"txn",account:a})} className="text-xs font-semibold text-blue-700">+ Money In/Out</button></td></tr>)}
        </tbody></table></div>}
      {tab==="cheques" && <div className="card overflow-hidden"><table className="w-full text-sm">
        <thead className="bg-slate-100 text-slate-600"><tr><th className="text-left p-2.5">Cheque No</th><th className="text-left p-2.5">{t("Type","प्रकार")}</th><th className="text-left p-2.5">Party</th><th className="text-left p-2.5">Due</th><th className="text-right p-2.5">Amount</th><th className="text-center p-2.5">Status</th><th className="text-right p-2.5">Action</th></tr></thead>
        <tbody>{cheques.length===0&&<tr><td className="p-3 text-slate-400" colSpan={7}>No cheques</td></tr>}
          {cheques.map(c=><tr key={c.id} className="border-b hover:bg-slate-50"><td className="p-2.5 font-semibold">{c.cheque_no}</td>
            <td className="p-2.5 text-xs">{c.cheque_type==="RECEIVABLE"?"In":"Out"}</td><td className="p-2.5">{c.party_name||pName(c.party)}</td>
            <td className="p-2.5 text-xs">{c.due_date||"—"}</td><td className="p-2.5 text-right">{money(c.amount)}</td>
            <td className="p-2.5 text-center"><span className="text-xs px-2 py-0.5 rounded-full" style={{background:c.status==="CLEARED"?"#dcfce7":c.status==="BOUNCED"?"#fee2e2":"#fef9c3",color:c.status==="CLEARED"?"#166534":c.status==="BOUNCED"?"#b91c1c":"#854d0e"}}>{c.status}</span></td>
            <td className="p-2.5 text-right whitespace-nowrap">{c.status==="PENDING"&&<>
              <button onClick={async()=>{await api(`/cheques/${c.id}/`,{method:"PATCH",body:JSON.stringify({status:"CLEARED"})});loadAll();}} className="text-xs text-green-700 font-semibold mr-2">Clear</button>
              <button onClick={async()=>{await api(`/cheques/${c.id}/`,{method:"PATCH",body:JSON.stringify({status:"BOUNCED"})});loadAll();}} className="text-xs text-red-600 font-semibold">Bounce</button></>}</td></tr>)}
        </tbody></table></div>}
      {tab==="loans" && <div className="card overflow-hidden"><table className="w-full text-sm">
        <thead className="bg-slate-100 text-slate-600"><tr><th className="text-left p-2.5">Lender</th><th className="text-right p-2.5">Principal</th><th className="text-right p-2.5">Rate %</th><th className="text-right p-2.5">Tenure</th><th className="text-right p-2.5">EMI</th><th className="text-right p-2.5">Total Interest</th><th className="text-right p-2.5">Outstanding</th></tr></thead>
        <tbody>{loans.length===0&&<tr><td className="p-3 text-slate-400" colSpan={7}>No loans</td></tr>}
          {loans.map(l=><tr key={l.id} className="border-b hover:bg-slate-50"><td className="p-2.5 font-semibold">{l.lender}</td>
            <td className="p-2.5 text-right">{money(l.principal)}</td><td className="p-2.5 text-right">{l.interest_rate}</td><td className="p-2.5 text-right">{l.tenure_months}m</td>
            <td className="p-2.5 text-right font-bold" style={{color:"#c2410c"}}>{money(l.emi)}</td><td className="p-2.5 text-right">{money(l.total_interest)}</td><td className="p-2.5 text-right">{money(l.current_balance)}</td></tr>)}
        </tbody></table></div>}
      {tab==="expenses" && <div>
        {expSum && <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <div className="card p-4"><div className="text-xs font-semibold text-slate-500">Total Expenses (30d)</div><div className="text-2xl font-extrabold mt-1" style={{color:"#dc2626"}}>{money(expSum.total)}</div></div>
          {(expSum.by_category||[]).slice(0,3).map(c=><div key={c.category} className="card p-4"><div className="text-xs font-semibold text-slate-500">{c.category}</div><div className="text-xl font-bold mt-1 text-slate-700">{money(c.amount)}</div></div>)}
        </div>}
        <div className="card overflow-hidden"><table className="w-full text-sm">
          <thead className="bg-slate-100 text-slate-600"><tr><th className="text-left p-2.5">Date</th><th className="text-left p-2.5">Category</th><th className="text-left p-2.5">Vendor</th><th className="text-left p-2.5">Mode</th><th className="text-right p-2.5">Amount</th><th className="text-right p-2.5">Tax</th><th className="text-right p-2.5">Total</th></tr></thead>
          <tbody>{expenses.length===0&&<tr><td className="p-3 text-slate-400" colSpan={7}>No expenses — add rent, electricity, diesel, labour</td></tr>}
            {expenses.map(e=><tr key={e.id} className="border-b hover:bg-slate-50"><td className="p-2.5 text-xs">{e.date}</td><td className="p-2.5 font-semibold">{e.category_name||"Other"}</td>
              <td className="p-2.5">{pName(e.party)}</td><td className="p-2.5 text-xs">{e.mode}</td><td className="p-2.5 text-right">{money(e.amount)}</td><td className="p-2.5 text-right text-slate-400">{money(e.tax_amount)}</td><td className="p-2.5 text-right font-bold" style={{color:"#dc2626"}}>{money(e.total)}</td></tr>)}
          </tbody></table></div>
      </div>}
      {modal && <CashBankModal modal={modal} parties={parties} expCats={expCats} onClose={()=>setModal(null)} onSaved={()=>{setModal(null);loadAll();}}/>}
    </div>);
}

function CashBankModal({modal,parties,expCats,onClose,onSaved}){
  const [f,setF]=useState({}),[busy,setBusy]=useState(false),[err,setErr]=useState("");
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const today=new Date().toISOString().slice(0,10);
  const cell="border border-slate-200 p-2 rounded-lg w-full text-sm mt-1";
  const save=async()=>{ setBusy(true); setErr("");
    try{
      if(modal.type==="accounts") await api("/bank-accounts/",{method:"POST",body:JSON.stringify({name:f.name||"",account_type:f.account_type||"BANK",account_no:f.account_no||"",ifsc:f.ifsc||"",bank_name:f.bank_name||"",upi_id:f.upi_id||"",opening_balance:String(f.opening_balance||0)})});
      else if(modal.type==="txn") await api("/bank-transactions/",{method:"POST",body:JSON.stringify({account:modal.account.id,date:f.date||today,direction:f.direction||"IN",amount:String(f.amount||0),mode:f.mode||"CASH",reference:f.reference||"",notes:f.notes||""})});
      else if(modal.type==="cheques") await api("/cheques/",{method:"POST",body:JSON.stringify({cheque_type:f.cheque_type||"RECEIVABLE",party:f.party?+f.party:null,cheque_no:f.cheque_no||"",bank_name:f.bank_name||"",amount:String(f.amount||0),issue_date:f.issue_date||null,due_date:f.due_date||null})});
      else if(modal.type==="loans") await api("/loans/",{method:"POST",body:JSON.stringify({lender:f.lender||"",principal:String(f.principal||0),interest_rate:String(f.interest_rate||0),tenure_months:+f.tenure_months||12,start_date:f.start_date||null})});
      else if(modal.type==="expenses"){ let catId=f.category?+f.category:null;
        if(f.newCat&&f.newCat.trim()){ const c=await api("/expense-categories/",{method:"POST",body:JSON.stringify({name:f.newCat.trim()})}).catch(()=>null); if(c)catId=c.id; }
        await api("/expenses/",{method:"POST",body:JSON.stringify({date:f.date||today,category:catId,party:f.party?+f.party:null,amount:String(f.amount||0),tax_amount:String(f.tax_amount||0),mode:f.mode||"CASH",reference:f.reference||"",notes:f.notes||""})}); }
      onSaved();
    }catch(e){ setErr(typeof e==="object"?JSON.stringify(e):"Save fail"); setBusy(false); } };
  const titles={accounts:"Add Bank / Cash Account",txn:"Money In / Out",cheques:"Add Cheque",loans:"Add Loan Account",expenses:"Add Expense"};
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto" style={{background:"rgba(15,23,42,.45)"}} onClick={onClose}>
      <div className="card my-12 w-full max-w-lg p-0 overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}><h3 className="text-white font-bold">{titles[modal.type]}</h3><button onClick={onClose} className="text-white text-xl">×</button></div>
        <div className="p-6 space-y-3">
          {err && <div className="bg-red-50 text-red-700 text-sm p-2 rounded-lg">{err}</div>}
          {modal.type==="accounts" && <>
            <div><label className="text-xs font-semibold text-slate-500">Account Name</label><input className={cell} value={f.name||""} onChange={e=>set("name",e.target.value)}/></div>
            <div><label className="text-xs font-semibold text-slate-500">Type</label><select className={cell} value={f.account_type||"BANK"} onChange={e=>set("account_type",e.target.value)}><option value="BANK">Bank Account</option><option value="CASH">Cash in Hand</option></select></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">A/c No</label><input className={cell} value={f.account_no||""} onChange={e=>set("account_no",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">IFSC</label><input className={cell} value={f.ifsc||""} onChange={e=>set("ifsc",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Bank Name</label><input className={cell} value={f.bank_name||""} onChange={e=>set("bank_name",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">UPI ID</label><input className={cell} value={f.upi_id||""} onChange={e=>set("upi_id",e.target.value)}/></div></div>
            <div><label className="text-xs font-semibold text-slate-500">{t("Opening Balance","ओपनिंग बैलेंस")}</label><input type="number" className={cell} value={f.opening_balance||""} onChange={e=>set("opening_balance",e.target.value)}/></div></>}
          {modal.type==="txn" && <>
            <div className="text-sm text-slate-500">{modal.account.name}</div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Direction</label><select className={cell} value={f.direction||"IN"} onChange={e=>set("direction",e.target.value)}><option value="IN">Money In (+)</option><option value="OUT">Money Out (−)</option></select></div>
              <div><label className="text-xs font-semibold text-slate-500">Amount</label><input type="number" className={cell} value={f.amount||""} onChange={e=>set("amount",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Date</label><input type="date" className={cell} value={f.date||today} onChange={e=>set("date",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">Mode</label><select className={cell} value={f.mode||"CASH"} onChange={e=>set("mode",e.target.value)}><option>CASH</option><option>BANK</option><option>UPI</option><option>CHEQUE</option></select></div></div>
            <div><label className="text-xs font-semibold text-slate-500">Notes</label><input className={cell} value={f.notes||""} onChange={e=>set("notes",e.target.value)}/></div></>}
          {modal.type==="cheques" && <>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Type</label><select className={cell} value={f.cheque_type||"RECEIVABLE"} onChange={e=>set("cheque_type",e.target.value)}><option value="RECEIVABLE">Receivable (In)</option><option value="PAYABLE">Payable (Out)</option></select></div>
              <div><label className="text-xs font-semibold text-slate-500">Party</label><select className={cell} value={f.party||""} onChange={e=>set("party",e.target.value)}><option value="">—</option>{parties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Cheque No</label><input className={cell} value={f.cheque_no||""} onChange={e=>set("cheque_no",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">Amount</label><input type="number" className={cell} value={f.amount||""} onChange={e=>set("amount",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Bank</label><input className={cell} value={f.bank_name||""} onChange={e=>set("bank_name",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">Due Date</label><input type="date" className={cell} value={f.due_date||""} onChange={e=>set("due_date",e.target.value)}/></div></div></>}
          {modal.type==="loans" && <>
            <div><label className="text-xs font-semibold text-slate-500">Lender / Bank</label><input className={cell} value={f.lender||""} onChange={e=>set("lender",e.target.value)}/></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Principal ₹</label><input type="number" className={cell} value={f.principal||""} onChange={e=>set("principal",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">Interest % (annual)</label><input type="number" className={cell} value={f.interest_rate||""} onChange={e=>set("interest_rate",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Tenure (months)</label><input type="number" className={cell} value={f.tenure_months||""} onChange={e=>set("tenure_months",e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-slate-500">Start Date</label><input type="date" className={cell} value={f.start_date||""} onChange={e=>set("start_date",e.target.value)}/></div></div></>}
          {modal.type==="expenses" && <>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs font-semibold text-slate-500">{t("Category","श्रेणी")}</label><select className={cell} value={f.category||""} onChange={e=>set("category",e.target.value)}><option value="">— choose / new below —</option>{(expCats||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
              <div><label className="text-xs font-semibold text-slate-500">…ya naya category</label><input className={cell} placeholder="Rent / Diesel / Labour" value={f.newCat||""} onChange={e=>set("newCat",e.target.value)}/></div></div>
            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-semibold text-slate-500">Amount</label><input type="number" className={cell} value={f.amount||""} onChange={e=>set("amount",e.target.value)}/></div>

    setMsg(`✓ ${r.number} → ${x.number} (${to==="SALE"?t("Invoice","इनवॉइस"):t("Order","ऑर्डर")}) ${t("ban gaya","बन गया")}`); setRetFor(null); load(); setTimeout(()=>setMsg(""),3500);

      <div className="flex gap-2 flex-wrap mb-4">
        {TABS.map(([t,l])=><button key={t} onClick={()=>setType(t)} className="px-3.5 py-1.5 rounded-full text-sm font-semibold" style={{background:type===t?"#ea6a1e":"#fff",color:type===t?"#fff":"#64748b",border:"1px solid "+(type===t?"#ea6a1e":"#e2e8f0")}}>{l}</button>)}

                <button onClick={async()=>{try{const x=await api(`/vouchers/${r.id}/email/`,{method:"POST",body:JSON.stringify({})});setMsg(x.sent?`✓ Email bheja ${x.to}`:`Email: ${x.to||"party has no email"}`);setTimeout(()=>setMsg(""),3000);}catch(e){setMsg("Email failed — add the party's email");setTimeout(()=>setMsg(""),3000);}}} className="text-blue-600 text-xs font-semibold mr-3">Email</button>

// ---------- Reports ----------
function RTable({head,rows}){
  return (<div className="card overflow-auto"><table className="w-full text-sm">
    <thead><tr>{head.map((h,i)=><th key={i} className={"p-3 "+(i===0?"text-left":"text-right")}>{h}</th>)}</tr></thead>
    <tbody>{rows.length===0&&<tr><td className="p-4 text-slate-400" colSpan={head.length}>No data</td></tr>}
      {rows.map((r,i)=><tr key={i} className="border-b">{r.map((c,j)=><td key={j} className={"p-3 "+(j===0?"text-left":"text-right")}>{c}</td>)}</tr>)}</tbody>
  </table></div>);
}
function StatCard({label,value,accent}){
  return (<div className="card p-5"><div className="text-xs font-semibold uppercase tracking-wider text-slate-400">{label}</div>
    <div className="text-2xl font-extrabold mt-2" style={{color:accent||"#0f172a"}}>{value}</div></div>);
}

function MarketingBroadcast({cloudReady}){
  const TEMPLATES=[
    ["🎉 Offer","Namaste {name} ji! 🎉 Hamari dukaan par special offer chal raha hai. Aaj hi aaiye aur fayda uthaiye. — Dhanyavaad"],
    ["🪔 Festival","🪔 {name} ji, aapko aur aapke parivaar ko festival ki dher saari shubhkamnayein! — Aapki dukaan"],
    ["🆕 Naya stock","Namaste {name} ji! 🆕 Naya stock aa gaya hai. Ek baar zaroor dekhiye. — Dhanyavaad"],
    ["💳 Reminder","Namaste {name} ji, aapka thoda udhaar baaki hai. Kripya jaldi clear karein. Dhanyavaad 🙏"],

  const [msg,setMsg]=useState(TEMPLATES[0][1]),[res,setRes]=useState(null),[busy,setBusy]=useState(false),[note,setNote]=useState("");
  const run=async(auto)=>{ if(!msg.trim()){setNote("Message likho");return;} setBusy(true); setNote("");
    try{ const r=await api("/marketing/broadcast/",{method:"POST",body:JSON.stringify({message:msg,auto:!!auto})}); setRes(r);
      setNote(auto&&r.cloud?("✓ "+r.sent+" customers ko auto-send ho gaya"):(r.count+" customers ready — neeche se Send dabao")); }
    catch(e){ setNote("Error: "+JSON.stringify(e)); } setBusy(false); };
  return (<div className="card p-5">
    <div className="flex items-center justify-between"><div className="font-bold text-slate-700">📣 {t("Marketing / Offers","मार्केटिंग / ऑफर")}</div>

    <p className="text-sm text-slate-500 mt-1">{t("Sab customers ko ek saath offer/festival message. {name} apne aap customer ka naam ban jaata hai.","Bulk offer/festival message; {name} = customer name.")}</p>
    <div className="flex flex-wrap gap-2 mt-3">{TEMPLATES.map(([l,tpl])=><button key={l} onClick={()=>setMsg(tpl)} className="text-xs bg-slate-100 px-3 py-1.5 rounded-lg font-semibold">{l}</button>)}</div>
    <textarea className="w-full border border-slate-200 rounded-xl p-3 mt-2 text-sm" rows="3" value={msg} onChange={e=>setMsg(e.target.value)} />
    <div className="flex flex-wrap gap-2 mt-2">
      <button onClick={()=>run(false)} disabled={busy} className="bg-slate-700 text-white px-4 py-2 rounded-xl text-sm font-semibold">{t("Preview recipients","रिसीवर देखें")}</button>
      {cloudReady && <button onClick={()=>{if(confirm(t("Sab customers ko auto-send kare?","Auto-send to all?")))run(true);}} disabled={busy} className="text-white px-4 py-2 rounded-xl text-sm font-bold" style={{background:"#25D366"}}>{t("Send to all (auto)","सबको भेजें")}</button>}
      {note && <span className="text-sm text-green-600 self-center">{note}</span>}
    </div>
    {res && res.recipients && res.recipients.length>0 && <div className="mt-3 max-h-72 overflow-y-auto border border-slate-100 rounded-xl">
      <table className="w-full text-sm"><tbody>
        {res.recipients.map(x=><tr key={x.id} className="border-b border-slate-50"><td className="p-2">{x.name}</td><td className="p-2 text-slate-400 text-xs">{x.phone}</td>
          <td className="p-2 text-right">{x.sent?<span className="text-green-600 text-xs font-semibold">✓ sent</span>:(x.wa_url?<a href={x.wa_url} target="_blank" className="text-xs font-bold text-white px-3 py-1 rounded-lg" style={{background:"#25D366"}}>Send</a>:<span className="text-xs text-slate-400">no phone</span>)}</td></tr>)}
      </tbody></table></div>}
  </div>);
}

// ---------- AI Munshi (chat + voice) ----------
function MunshiChat(){
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{me:false,text:t("Namaste! Main aapka Munshi. Poochho: \"aaj ki bikri?\", \"kaun udhaar me hai?\", ya \"parcha: 2 kilo cheeni\".","Namaste! Main aapka Munshi.")}]);
  const [inp,setInp]=useState(""),[busy,setBusy]=useState(false),[rec,setRec]=useState(false);
  const boxRef=useRef(null);
  const [alertShown,setAlertShown]=useState(false),[alertCount,setAlertCount]=useState(0);
  useEffect(()=>{ api("/alerts/").then(d=>setAlertCount((d&&d.count)||0)).catch(()=>{}); },[]);
  useEffect(()=>{ if(boxRef.current)boxRef.current.scrollTop=boxRef.current.scrollHeight; },[msgs,open]);
  useEffect(()=>{ if(open&&!alertShown){ setAlertShown(true);
    api("/alerts/").then(d=>{ if(d&&d.alerts&&d.alerts.length){ const txt="🔔 "+t("Dhyan do","Alerts")+":\n"+d.alerts.map(a=>a.icon+" "+a.text).join("\n"); setMsgs(m=>[...m,{me:false,text:txt}]); } }).catch(()=>{});
  } },[open]);
  const send=async(q)=>{ const text=(q||inp).trim(); if(!text)return; setInp("");
    setMsgs(m=>[...m,{me:true,text}]); setBusy(true);
    try{ const r=await api("/munshi/ask/",{method:"POST",body:JSON.stringify({q:text})}); setMsgs(m=>[...m,{me:false,text:r.answer||"..."}]); }
    catch(e){ setMsgs(m=>[...m,{me:false,text:t("Kuch gadbad ho gayi.","Error.")}]); } setBusy(false); };
  const mic=()=>{ const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ alert(t("Aapke browser me voice support nahi. Chrome try karo.","Voice not supported. Try Chrome.")); return; }
    const r=new SR(); r.lang="hi-IN"; r.interimResults=false; setRec(true);
    r.onresult=e=>{ const txt=e.results[0][0].transcript; setInp(txt); setRec(false); send(txt); };
    r.onerror=()=>setRec(false); r.onend=()=>setRec(false); r.start(); };
  const fileRef=useRef(null);
  const loadTess=()=>new Promise((res,rej)=>{ if(window.Tesseract)return res(); const s=document.createElement("script"); s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"; s.onload=res; s.onerror=rej; document.body.appendChild(s); });
  const onPhoto=async(e)=>{ const file=e.target.files&&e.target.files[0]; if(!file)return;
    setMsgs(m=>[...m,{me:true,text:t("📷 Parchi ki photo bheji…","📷 photo sent…")}]); setBusy(true);
    try{ await loadTess();
      const {data}=await window.Tesseract.recognize(file,"eng");
      const text=(data&&data.text||"").replace(/[|]/g," ").replace(/\n+/g,", ").replace(/\s+/g," ").trim();
      if(!text){ setMsgs(m=>[...m,{me:false,text:t("Photo se text saaf nahi mila — thodi saaf photo try karo (achhi roshni me).","No clear text.")}]); setBusy(false); e.target.value=""; return; }
      const r=await api("/munshi/ask/",{method:"POST",body:JSON.stringify({q:"parcha: "+text})});
      setMsgs(m=>[...m,{me:false,text:r.answer||"..."}]);
    }catch(err){ setMsgs(m=>[...m,{me:false,text:t("Photo padhne me dikkat. Chrome me try karo.","OCR failed. Try Chrome.")}]); }
    setBusy(false); e.target.value=""; };
  if(!open) return <button onClick={()=>setOpen(true)} title="Munshi" className="fixed z-40 rounded-full shadow-lg flex items-center justify-center text-white" style={{bottom:20,right:20,width:56,height:56,background:"linear-gradient(135deg,#ea6a1e,#c2410c)",fontSize:26}}>🧑‍💼{alertCount>0 && <span className="absolute flex items-center justify-center text-white font-bold rounded-full" style={{top:-2,right:-2,minWidth:20,height:20,fontSize:11,background:"#dc2626",padding:"0 5px"}}>{alertCount}</span>}</button>;
  return (<div className="fixed z-40 flex flex-col bg-white rounded-2xl shadow-2xl border border-slate-200" style={{bottom:20,right:20,width:340,maxWidth:"92vw",height:480,maxHeight:"78vh"}}>
    <div className="flex items-center justify-between px-4 py-3 rounded-t-2xl text-white" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>
      <div className="flex items-center gap-2 font-bold">🧑‍💼 {t("Munshi","मुंशी")} <span className="text-[10px] bg-white/25 px-1.5 py-0.5 rounded">AI</span></div>
      <button onClick={()=>setOpen(false)} className="text-white/90 text-lg">✕</button>
    </div>
    <div ref={boxRef} className="flex-1 overflow-y-auto p-3 space-y-2 bg-slate-50">
      {msgs.map((m,i)=><div key={i} className={"max-w-[85%] px-3 py-2 rounded-2xl text-sm whitespace-pre-line "+(m.me?"ml-auto bg-blue-900 text-white":"bg-white border border-slate-100 text-slate-700")}>{m.text}</div>)}
      {busy&&<div className="text-xs text-slate-400">Munshi soch raha hai…</div>}
    </div>
    <div className="p-2 border-t flex items-center gap-1">
      <button onClick={mic} title={t("Bolo","Speak")} className={"w-9 h-9 rounded-full flex items-center justify-center shrink-0 "+(rec?"bg-red-500 text-white animate-pulse":"bg-slate-100")}>🎤</button>
      <button onClick={()=>fileRef.current&&fileRef.current.click()} title={t("Parchi ki photo","Photo bill")} className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 bg-slate-100">📷</button>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPhoto} className="hidden" />
      <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={t("Likho, bolo ya photo…","Type, speak or photo…")} className="flex-1 min-w-0 border border-slate-200 rounded-full px-3 py-2 text-sm" />
      <button onClick={()=>send()} className="w-9 h-9 rounded-full text-white flex items-center justify-center shrink-0" style={{background:"linear-gradient(135deg,#ea6a1e,#c2410c)"}}>➤</button>
    </div>
  </div>);
}

  const add=v=>{ setCart(c=>{ const i=c.findIndex(x=>x.id===v.id); if(i>=0){ const n=[...c]; n[i]={...n[i],qty:n[i].qty+1}; return n; }
    return [...c,{id:v.id,label:v.label,unit:v.unit,rate:v.rate,tax:v.tax,qty:1}]; }); };
  const setQty=(i,d)=>setCart(c=>{ const n=[...c]; n[i]={...n[i],qty:Math.max(0,n[i].qty+d)}; return n.filter(x=>x.qty>0); });
  const totals=cart.reduce((a,c)=>{const base=c.qty*c.rate;const tax=base*c.tax/100;a.taxable+=base;a.tax+=tax;a.total+=base+tax;return a;},{taxable:0,tax:0,total:0});

  return (
    <div className="p-4 fade-in grid md:grid-cols-3 gap-4" style={{height:"calc(100vh - 90px)"}}>

        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-2 overflow-y-auto pr-1">
          {filt.slice(0,60).map(v=><button key={v.id} onClick={()=>add(v)} className="card p-3 text-left hover-lift">
            <div className="text-sm font-semibold text-slate-700 truncate">{v.label}</div>

            <div className="text-sm font-bold mt-1" style={{color:"#c2410c"}}>{money(v.rate)}</div></button>)}
        </div>
      </div>
      <div className="card p-4 flex flex-col min-h-0">
        <div className="flex items-center justify-between mb-2">

        </div>
        {done && <div className="text-xs rounded-lg p-2 mb-2" style={{background:"#ecfdf5",color:"#166534"}}>✓ {done.number} — {money(done.grand_total)} · receipt printed</div>}

function JournalModal({je,accounts,onClose,onSaved}){

    if(dr===0){setErr("Amount cannot be 0");return;}

  useEffect(()=>{ if(ref.current)ref.current.focus(); },[]);
  const actions=[
    {label:"New Sale / Invoice",hint:"New Invoice",go:()=>onGo("sale","SALE")},
    {label:"New Purchase",hint:"Purchase Entry",go:()=>onGo("sale","PURCHASE")},
    {label:"Add Expense",hint:"Add Expense",go:()=>onGo("cashbank")},
    {label:"Payment Reminders",hint:"Overdue parties",go:()=>onGo("reports")},
    {label:"Barcode & Labels",hint:"Label print",go:()=>onGo("utils")},
    ...nav.map(([k,l])=>({label:l,hint:"Open",go:()=>onGo(k)})),
  ];
  const filt=actions.filter(a=>!q||a.label.toLowerCase().includes(q.toLowerCase()));
  const run=a=>{ a.go(); onClose(); };
  return (
    <div className="fixed inset-0 z-[60] flex items-start justify-center pt-24" style={{background:"rgba(15,23,42,.5)"}} onClick={onClose}>
      <div className="card w-full max-w-xl overflow-hidden" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-2 px-4 py-3 border-b">
          <span className="text-slate-400">⌘</span>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Type anything (e.g. sale, party, report)…"
            onKeyDown={e=>{if(e.key==="Enter"&&filt[0])run(filt[0]); if(e.key==="Escape")onClose();}}
            className="flex-1 outline-none text-sm" />
          <span className="text-xs text-slate-400 border rounded px-1.5 py-0.5">Esc</span>
        </div>
        <div className="max-h-80 overflow-y-auto">
          {filt.length===0 && <div className="p-4 text-sm text-slate-400">Nothing found</div>}
          {filt.map((a,i)=><button key={i} onClick={()=>run(a)} className="w-full text-left px-4 py-2.5 hover:bg-orange-50 flex items-center justify-between border-b border-slate-50">
            <span className="text-sm font-semibold text-slate-700">{a.label}</span><span className="text-xs text-slate-400">{a.hint}</span></button>)}
        </div>
      </div>
    </div>);
}

function App(){
  const [authed,setAuthed]=useState(!!getToken());
  const [cmdOpen,setCmdOpen]=useState(false);
  useEffect(()=>{ const h=e=>{ if((e.metaKey||e.ctrlKey)&&(e.key==="k"||e.key==="K")){ e.preventDefault(); setCmdOpen(o=>!o); } };
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h); },[]);
  const [tab,setTab]=useState(()=>{ try{return localStorage.getItem("dm_tab")||"dash";}catch(e){return "dash";} });
  useEffect(()=>{ try{localStorage.setItem("dm_tab",tab);}catch(e){} },[tab]);
  const [sub,setSub]=useState(null),[loaded,setLoaded]=useState(false),[me,setMe]=useState(null);
  const [open,setOpen]=useState(false);
  const [saleMode,setSaleMode]=useState("SALE");
  const [gsearch,setGsearch]=useState("");
  const [theme,setTheme]=useState(()=>localStorage.getItem("dm_theme")||"light");
  useEffect(()=>{ document.body.dataset.theme=theme; localStorage.setItem("dm_theme",theme); },[theme]);
  const loadSub=()=>api("/subscription/").then(s=>{setSub(s);setLoaded(true);}).catch(()=>setLoaded(true));
  useEffect(()=>{ if(authed){ loadSub(); api("/me/").then(setMe).catch(()=>{}); } },[authed]);
  useEffect(()=>{ const q=new URLSearchParams(window.location.search); const pay=q.get("pay");
    if(pay){ setTab("plan");
      if(pay==="success") alert("✓ Payment successful — plan activate ho gaya!");
      else if(pay==="failed") alert("✗ Payment verify fail — dobara try karo (ya RAZORPAY_KEY_SECRET check karo).");
      else if(pay==="notfound") alert("Order not found — dobara try karo.");
      if(authed) loadSub();
      window.history.replaceState({}, "", window.location.pathname); } },[]);
  if(!authed) return <Login onLogin={()=>setAuthed(true)} />;
  const expired = loaded && sub && !sub.access_allowed;
  const isAdmin = me && me.is_platform_admin;
  const toggleTheme=()=>setTheme(t=>t==="dark"?"light":"dark");
  const logout=()=>{ clearAuth(); setAuthed(false); setSub(null); };
  const nav=[["dash",t("Dashboard","डैशबोर्ड")],["pos",t("POS Billing","POS बिलिंग")],["sale",t("New Sale","नई बिक्री")],["vouchers",t("Sales & Transactions","बिक्री व लेन-देन")],["orders",t("Online Orders","ऑनलाइन ऑर्डर")],["items",t("Items","आइटम")],["parties",t("Parties","पार्टी")],["cashbank",t("Cash & Bank","कैश व बैंक")],["accounting",t("Accounting","अकाउंटिंग")],["reports",t("Reports","रिपोर्ट")],["utils",t("Utilities","यूटिलिटीज़")],["whatsapp",t("WhatsApp","व्हाट्सएप")],["hr",t("HR / Payroll","HR / पेरोल")],["committee",t("Committee / BC","कमेटी / BC")],["market",t("Marketplace","मार्केटप्लेस")],["staff",t("App Users","ऐप यूज़र")],["settings",t("Settings","सेटिंग्स")],["plan",t("Subscription","सब्सक्रिप्शन")]];
  if(isAdmin) nav.push(["admin","Platform Admin"]);
  const onActivated=s=>{ setSub(s); setTab("dash"); };
  const go=(k,mode)=>{ setTab(k); if(mode)setSaleMode(mode); setOpen(false); };
  return (
    <div className="md:flex md:h-screen md:overflow-hidden">
      {cmdOpen && <CommandPalette nav={nav} onGo={go} onClose={()=>setCmdOpen(false)} />}
      {/* Mobile top bar */}
      <div className="md:hidden bg-blue-900 text-white flex items-center justify-between p-3">
        <button onClick={()=>setOpen(!open)} className="text-xl">☰</button>
        <span className="font-bold">Digital Munshi</span><span></span>
      </div>
      <aside className={(open?"block":"hidden")+" md:flex md:w-60 w-full bg-blue-900 text-white p-4 flex-col md:h-screen md:overflow-y-auto md:shrink-0"}>
        <div className="hidden md:flex items-center gap-2.5 mb-1 px-1">
          {me && me.logo
            ? <div className="rounded-xl bg-white flex items-center justify-center overflow-hidden" style={{width:38,height:38}}><img src={me.logo} style={{width:"100%",height:"100%",objectFit:"contain"}} /></div>
            : <div className="rounded-xl bg-white/15 flex items-center justify-center" style={{width:36,height:36,fontSize:18}}>📒</div>}
          <div><div className="font-extrabold text-base leading-tight">Digital Munshi</div>
            <div className="text-xs text-indigo-300 leading-tight">{sub?sub.organization_name:"ERP"}</div></div>
        </div>
        <div className="mt-4 mb-1 hidden md:block"><FirmSwitcher /></div>
        <div className="mt-2 mb-1 px-2 text-[10px] uppercase tracking-wider text-indigo-300 hidden md:block">Menu</div>
        {nav.map(([k,l])=><button key={k} onClick={()=>go(k)} className={"flex items-center gap-3 text-left mb-1 "+(tab===k?"bg-blue-700":"")+(k==="plan"?" mt-2":"")}><Icon n={k} size={17}/><span>{l}</span></button>)}
        <button onClick={()=>{clearAuth();setAuthed(false);setSub(null);}} className="md:mt-auto flex items-center gap-3 text-left text-indigo-300"><Icon n="logout" size={17}/><span>Logout</span></button>
      </aside>
      <main className="flex-1 md:h-screen overflow-y-auto">
        <TopBar me={me} sub={sub} onNav={go} theme={theme} toggleTheme={toggleTheme} onLogout={logout} onSearch={(q)=>{setGsearch(q); go("vouchers");}} />
        <Banner sub={sub} onUpgrade={()=>setTab("plan")} />
        {expired && tab!=="plan" && tab!=="settings"
          ? <Subscribe sub={sub} onActivated={onActivated} />
          : <>
            {tab==="dash" && <Dashboard onNav={go}/>}
            {tab==="sale" && <NewSale key={saleMode} initialDoc={saleMode}/>}
            {tab==="items" && <ItemView />}
            {tab==="cashbank" && <CashBankView />}
            {tab==="pos" && <POSView />}
            {tab==="accounting" && <AccountingView />}
            {tab==="utils" && <UtilitiesView />}
            {tab==="parties" && <PartyView />}
            {tab==="vouchers" && <VouchersView key={"v"+gsearch} initialQuery={gsearch} onNav={go} />}
            {tab==="reports" && <ReportsView/>}
            {tab==="whatsapp" && <WhatsAppView/>}
            {tab==="hr" && <HRView/>}
            {tab==="committee" && <CommitteeView/>}
            {tab==="market" && <MarketplaceView/>}
            {tab==="orders" && <OrdersView/>}
            {tab==="staff" && <StaffView/>}
            {tab==="settings" && <Settings onSaved={()=>{}} />}
            {tab==="admin" && <AdminPanel/>}
            {tab==="plan" && <Subscribe sub={sub} onActivated={onActivated} />}
          </>}
      </main>
      <MunshiChat/>
    </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
{% endverbatim %}
</script>
</body>
